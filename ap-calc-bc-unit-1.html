<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Calculus BC - Unit 1 Quiz</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 850px;
            margin: 0 auto;
            padding: 30px 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .intro {
            text-align: center;
            margin-bottom: 40px;
            color: #555;
            font-size: 1.1em;
        }
        .question-card {
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            border-top: 5px solid #e67e22;
            display: none; /* hidden by default */
        }
        .question-card.active {
            display: block;
            animation: fadeIn 0.4s;
        }
        .question-header {
            font-weight: 600;
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 15px;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.1em;
            display: flex;
            align-items: center;
        }
        .option:hover:not(.disabled) {
            background-color: #e2e6ea;
            border-color: #dae0e5;
        }
        .option-label {
            font-weight: bold;
            margin-right: 15px;
            background: #e67e22;
            color: white;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .option.correct .option-label {
            background-color: #28a745;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .option.incorrect .option-label {
            background-color: #dc3545;
        }
        .option.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 6px;
            display: none;
            font-size: 1.05em;
        }
        .feedback.show {
            display: block;
            animation: fadeIn 0.5s;
        }
        .feedback.correct-feedback {
            background-color: #d4edda;
            border-left: 5px solid #28a745;
            color: #155724;
        }
        .feedback.incorrect-feedback {
            background-color: #f8d7da;
            border-left: 5px solid #dc3545;
            color: #721c24;
        }
        .next-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #e67e22;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
            float: right;
            display: none;
            transition: background 0.2s;
        }
        .next-btn:hover {
            background-color: #d35400;
        }
        .next-btn.show {
            display: block;
        }
        .clearfix::after {
            content: "";
            clear: both;
            display: table;
        }
        .status-icon {
            margin-left: auto;
            font-weight: bold;
            font-size: 1.3em;
        }
        #score-container {
            display: none;
            text-align: center;
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #2ecc71;
        }
        #score-container h2 {
            color: #2c3e50;
            font-size: 2em;
            margin-bottom: 10px;
        }
        #score-container .score {
            font-size: 3em;
            color: #2ecc71;
            font-weight: bold;
        }
        .progress {
            text-align: center;
            font-weight: bold;
            color: #7f8c8d;
            margin-bottom: 20px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>AP Calculus BC Quiz<br>Unit 1: Limits and Continuity</h1>
    <p class="intro" id="intro-text">Test your knowledge of evaluating limits, asymptotes, L'Hôpital's rule, and theorems of continuity. Good luck!</p>

    <div class="progress" id="progress-text">Question 1 of 20</div>
    <div id="quiz-container"></div>

    <div id="score-container">
        <h2>Quiz Complete!</h2>
        <p>Your final score is:</p>
        <div class="score" id="final-score">0 / 20</div>
    </div>

    <script>
        const quizData = [
            {
                q: "Evaluate the limit: \\( \\displaystyle \\lim_{x \\to 0} \\frac{e^x - 1 - x}{x^2} \\).",
                options: [
                    "\\( 1 \\)",
                    "\\( \\frac{1}{2} \\)",
                    "\\( 0 \\)",
                    "\\( \\text{DNE} \\)"
                ],
                correct: 1,
                explanation: "Applying L'Hôpital's Rule (form 0/0): \\( \\lim_{x \\to 0} \\frac{e^x - 1}{2x} \\). Still 0/0, apply again: \\( \\lim_{x \\to 0} \\frac{e^x}{2} = \\frac{1}{2} \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to \\infty} \\frac{\\sqrt{9x^2+2}}{4x+3} \\).",
                options: [
                    "\\( \\frac{9}{4} \\)",
                    "\\( \\frac{3}{4} \\)",
                    "\\( \\frac{3}{2} \\)",
                    "\\( \\infty \\)"
                ],
                correct: 1,
                explanation: "Divide the numerator and denominator by \\( x \\). Since \\( x \\to \\infty \\), \\( x = \\sqrt{x^2} \\). The limit becomes \\( \\lim_{x \\to \\infty} \\frac{\\sqrt{9 + 2/x^2}}{4 + 3/x} = \\frac{\\sqrt{9}}{4} = \\frac{3}{4} \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 3^-} \\frac{|x-3|}{x-3} \\).",
                options: [
                    "\\( 1 \\)",
                    "\\( 0 \\)",
                    "\\( -1 \\)",
                    "\\( \\text{DNE} \\)"
                ],
                correct: 2,
                explanation: "For \\( x < 3 \\), \\( x - 3 < 0 \\), so \\( |x - 3| = -(x - 3) \\). The expression becomes \\( \\frac{-(x-3)}{x-3} = -1 \\). Thus, the left-hand limit is \\( -1 \\)."
            },
            {
                q: "Let \\( f(x) = \\begin{cases} cx^2 + 2x & x < 2 \\\\ x^3 - cx & x \\ge 2 \\end{cases} \\). Find the value of \\( c \\) that makes \\( f \\) continuous at \\( x = 2 \\).",
                options: [
                    "\\( \\frac{2}{3} \\)",
                    "\\( \\frac{4}{3} \\)",
                    "\\( 1 \\)",
                    "\\( 0 \\)"
                ],
                correct: 0,
                explanation: "For continuity at \\( x = 2 \\), the left- and right-hand limits must be equal. \\( \\lim_{x \\to 2^-} f(x) = 4c + 4 \\) and \\( \\lim_{x \\to 2^+} f(x) = 8 - 2c \\). Setting them equal: \\( 4c + 4 = 8 - 2c \\implies 6c = 4 \\implies c = \\frac{2}{3} \\)."
            },
            {
                q: "Evaluate the limit: \\( \\displaystyle \\lim_{h \\to 0} \\frac{\\sin(\\pi/6 + h) - 1/2}{h} \\).",
                options: [
                    "\\( \\frac{1}{2} \\)",
                    "\\( 0 \\)",
                    "\\( \\frac{\\sqrt{3}}{2} \\)",
                    "\\( 1 \\)"
                ],
                correct: 2,
                explanation: "This limit represents the definition of the derivative of \\( f(x) = \\sin x \\) at \\( x = \\pi/6 \\). \\( f'(x) = \\cos x \\), and \\( \\cos(\\pi/6) = \\frac{\\sqrt{3}}{2} \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 0} \\frac{\\sin(5x)}{3x} \\).",
                options: [
                    "\\( \\frac{5}{3} \\)",
                    "\\( \\frac{3}{5} \\)",
                    "\\( 1 \\)",
                    "\\( 0 \\)"
                ],
                correct: 0,
                explanation: "Multiply and divide by 5 to use the identity \\( \\lim_{u \\to 0} \\frac{\\sin u}{u} = 1 \\). \\( \\lim_{x \\to 0} \\frac{5}{3} \\cdot \\frac{\\sin(5x)}{5x} = \\frac{5}{3} (1) = \\frac{5}{3} \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to \\infty} \\left(1 + \\frac{2}{x}\\right)^{3x} \\).",
                options: [
                    "\\( e^2 \\)",
                    "\\( e^3 \\)",
                    "\\( e^6 \\)",
                    "\\( e^{2/3} \\)"
                ],
                correct: 2,
                explanation: "Using the definition \\( \\lim_{x \\to \\infty} \\left(1 + \\frac{a}{x}\\right)^{bx} = e^{ab} \\). Here \\( a = 2 \\) and \\( b = 3 \\), so the limit evaluates to \\( e^{2 \\cdot 3} = e^6 \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 0} \\frac{\\sqrt{x+4}-2}{x} \\).",
                options: [
                    "\\( \\frac{1}{2} \\)",
                    "\\( 0 \\)",
                    "\\( \\frac{1}{4} \\)",
                    "\\( \\text{DNE} \\)"
                ],
                correct: 2,
                explanation: "Multiply numerator and denominator by the conjugate \\( \\sqrt{x+4} + 2 \\). This gives \\( \\frac{x+4-4}{x(\\sqrt{x+4}+2)} = \\frac{x}{x(\\sqrt{x+4}+2)} = \\frac{1}{\\sqrt{x+4}+2} \\). At \\( x=0 \\), this is \\( \\frac{1}{2+2} = \\frac{1}{4} \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 1} \\frac{x-1}{\\sqrt{x^2+3}-2} \\).",
                options: [
                    "\\( 2 \\)",
                    "\\( 1 \\)",
                    "\\( \\frac{1}{2} \\)",
                    "\\( 0 \\)"
                ],
                correct: 0,
                explanation: "Multiply by the conjugate \\( \\sqrt{x^2+3} + 2 \\). The denominator becomes \\( (x^2+3)-4 = x^2-1 = (x-1)(x+1) \\). Cancel \\( (x-1) \\) to get \\( \\frac{\\sqrt{x^2+3}+2}{x+1} \\). At \\( x=1 \\), we get \\( \\frac{2+2}{2} = 2 \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 0^+} x \\ln x \\).",
                options: [
                    "\\( 1 \\)",
                    "\\( e \\)",
                    "\\( -\\infty \\)",
                    "\\( 0 \\)"
                ],
                correct: 3,
                explanation: "Rewrite as \\( \\frac{\\ln x}{1/x} \\) to use L'Hôpital's Rule (form \\( -\\infty / \\infty \\)). Differentiating yields \\( \\frac{1/x}{-1/x^2} = -x \\). As \\( x \\to 0^+ \\), \\( -x \\to 0 \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 0} \\left(\\frac{1}{x} - \\frac{1}{e^x-1}\\right) \\).",
                options: [
                    "\\( 1 \\)",
                    "\\( \\frac{1}{2} \\)",
                    "\\( 0 \\)",
                    "\\( -1 \\)"
                ],
                correct: 1,
                explanation: "Combine into a single fraction: \\( \\frac{e^x - 1 - x}{x(e^x - 1)} \\). Apply L'Hôpital's Rule: \\( \\frac{e^x - 1}{e^x - 1 + xe^x} \\). Apply L'Hôpital's again: \\( \\frac{e^x}{2e^x + xe^x} \\). At \\( x=0 \\), this evaluates to \\( \\frac{1}{2(1)+0} = \\frac{1}{2} \\)."
            },
            {
                q: "Consider \\( f(x) = \\frac{x^2 - 4}{|x-2|} \\). Which of the following is true?",
                options: [
                    "Removable discontinuity at \\( x=2 \\)",
                    "Jump discontinuity at \\( x=2 \\)",
                    "Infinite discontinuity at \\( x=2 \\)",
                    "Continuous at \\( x=2 \\)"
                ],
                correct: 1,
                explanation: "For \\( x > 2 \\), \\( f(x) = \\frac{(x-2)(x+2)}{x-2} = x+2 \\), limit is 4. For \\( x < 2 \\), \\( f(x) = \\frac{(x-2)(x+2)}{-(x-2)} = -(x+2) \\), limit is -4. Since the left and right limits are finite but not equal, it's a jump discontinuity."
            },
            {
                q: "According to the Intermediate Value Theorem, which interval must contain a root for \\( f(x) = x^3 - 3x + 1 = 0 \\)?",
                options: [
                    "\\( [-1, 0] \\)",
                    "\\( [1, 2] \\)",
                    "\\( [0, 1] \\)",
                    "\\( [2, 3] \\)"
                ],
                correct: 2,
                explanation: "Evaluate the function at the endpoints. \\( f(0) = 1 \\) and \\( f(1) = 1 - 3 + 1 = -1 \\). Since \\( f(0) > 0 \\) and \\( f(1) < 0 \\) and \\( f(x) \\) is a continuous polynomial, a root must exist in \\( (0, 1) \\)."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 0} \\frac{1 - \\cos x}{x^2} \\).",
                options: [
                    "\\( 0 \\)",
                    "\\( 1 \\)",
                    "\\( \\frac{1}{2} \\)",
                    "\\( 2 \\)"
                ],
                correct: 2,
                explanation: "Using L'Hôpital's Rule (form 0/0): \\( \\lim_{x \\to 0} \\frac{\\sin x}{2x} \\). Since \\( \\lim_{x \\to 0} \\frac{\\sin x}{x} = 1 \\), the answer is \\( \\frac{1}{2} \\cdot 1 = \\frac{1}{2} \\)."
            },
            {
                q: "Let \\( 1 - x^2 \\le g(x) \\le \\frac{\\sin x}{x} \\) for \\( x \\neq 0 \\). Find \\( \\displaystyle \\lim_{x \\to 0} g(x) \\).",
                options: [
                    "\\( 0 \\)",
                    "\\( 1 \\)",
                    "\\( \\text{DNE} \\)",
                    "Cannot be determined"
                ],
                correct: 1,
                explanation: "By the Squeeze Theorem: \\( \\lim_{x \\to 0} (1 - x^2) = 1 \\) and \\( \\lim_{x \\to 0} \\frac{\\sin x}{x} = 1 \\). Since \\( g(x) \\) is squeezed between two functions approaching 1, \\( \\lim_{x \\to 0} g(x) = 1 \\)."
            },
            {
                q: "Find the horizontal asymptote(s) of \\( y = \\frac{e^x}{e^x - e^{-x}} \\).",
                options: [
                    "\\( y = 1 \\)",
                    "\\( y = -1 \\) and \\( y = 1 \\)",
                    "\\( y = 0 \\) and \\( y = 1 \\)",
                    "\\( y = 0 \\)"
                ],
                correct: 2,
                explanation: "As \\( x \\to \\infty \\), \\( e^{-x} \\to 0 \\), so the expression behaves like \\( \\frac{e^x}{e^x} = 1 \\). As \\( x \\to -\\infty \\), \\( e^x \\to 0 \\) and \\( e^{-x} \\to \\infty \\), so the expression behaves like \\( \\frac{0}{-\\infty} = 0 \\). Thus, \\( y=0 \\) and \\( y=1 \\) are HA."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to \\infty} \\frac{\\ln(x)}{x^2} \\).",
                options: [
                    "\\( 0 \\)",
                    "\\( 1 \\)",
                    "\\( \\infty \\)",
                    "\\( \\frac{1}{2} \\)"
                ],
                correct: 0,
                explanation: "Using L'Hôpital's Rule (form \\( \\infty / \\infty \\)): \\( \\lim_{x \\to \\infty} \\frac{1/x}{2x} = \\lim_{x \\to \\infty} \\frac{1}{2x^2} = 0 \\). Alternately, polynomials grow faster than logarithms at infinity."
            },
            {
                q: "Evaluate: \\( \\displaystyle \\lim_{x \\to 0} x^2 \\sin\\left(\\frac{1}{x}\\right) \\).",
                options: [
                    "\\( 1 \\)",
                    "\\( \\infty \\)",
                    "\\( 0 \\)",
                    "\\( \\text{DNE} \\)"
                ],
                correct: 2,
                explanation: "Because \\( -1 \\le \\sin(1/x) \\le 1 \\), we have \\( -x^2 \\le x^2 \\sin(1/x) \\le x^2 \\). Since both bounding functions go to 0 as \\( x \\to 0 \\), the Squeeze Theorem forces the limit to be 0."
            },
            {
                q: "Find the vertical asymptote(s) of \\( f(x) = \\frac{x^2+x-6}{x^2-4} \\).",
                options: [
                    "\\( x = 2 \\)",
                    "\\( x = -2 \\)",
                    "\\( x = 2 \\) and \\( x = -2 \\)",
                    "None"
                ],
                correct: 1,
                explanation: "Factor the numerator and denominator: \\( f(x) = \\frac{(x+3)(x-2)}{(x+2)(x-2)} \\). For \\( x \\neq 2 \\), \\( f(x) = \\frac{x+3}{x+2} \\). There is a removable discontinuity at \\( x=2 \\) and a vertical asymptote at \\( x=-2 \\)."
            },
            {
                q: "Let \\( f(x) = \\frac{x^3 - 8}{x - 2} \\) for \\( x \\neq 2 \\). If \\( f \\) is continuous at \\( x=2 \\), what is \\( f(2) \\)?",
                options: [
                    "\\( 0 \\)",
                    "\\( 4 \\)",
                    "\\( 8 \\)",
                    "\\( 12 \\)"
                ],
                correct: 3,
                explanation: "To make \\( f \\) continuous, \\( f(2) \\) must equal the limit as \\( x \\to 2 \\). Factor the difference of cubes: \\( \\frac{(x-2)(x^2+2x+4)}{x-2} = x^2 + 2x + 4 \\). Evaluating at \\( x=2 \\) yields \\( 2^2 + 2(2) + 4 = 12 \\)."
            }
        ];

        const labels = ['A', 'B', 'C', 'D'];
        const container = document.getElementById('quiz-container');
        const progressText = document.getElementById('progress-text');
        const scoreContainer = document.getElementById('score-container');
        const finalScoreText = document.getElementById('final-score');
        const introText = document.getElementById('intro-text');
        
        let currentQuestion = 0;
        let score = 0;

        function loadQuestion(index) {
            container.innerHTML = '';
            progressText.innerText = `Question ${index + 1} of ${quizData.length}`;
            
            const item = quizData[index];
            const card = document.createElement('div');
            card.className = 'question-card active';
            
            const header = document.createElement('div');
            header.className = 'question-header';
            header.innerHTML = `Question ${index + 1}: ${item.q}`;
            card.appendChild(header);

            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';

            item.options.forEach((optText, optIndex) => {
                const optElement = document.createElement('div');
                optElement.className = 'option';
                
                const labelElement = document.createElement('span');
                labelElement.className = 'option-label';
                labelElement.textContent = labels[optIndex];

                const textElement = document.createElement('span');
                textElement.innerHTML = optText;

                const statusIcon = document.createElement('span');
                statusIcon.className = 'status-icon';

                optElement.appendChild(labelElement);
                optElement.appendChild(textElement);
                optElement.appendChild(statusIcon);

                optElement.addEventListener('click', () => {
                    // Prevent multiple clicks
                    if (optionsDiv.classList.contains('answered')) return;
                    optionsDiv.classList.add('answered');
                    
                    let isCorrect = (optIndex === item.correct);
                    if (isCorrect) score++;

                    // Disable all options and show colors
                    Array.from(optionsDiv.children).forEach((child, i) => {
                        child.classList.add('disabled');
                        if (i === item.correct) {
                            child.classList.add('correct');
                            child.querySelector('.status-icon').innerHTML = '✓';
                        }
                    });

                    // Mark incorrect if wrong
                    if (!isCorrect) {
                        optElement.classList.add('incorrect');
                        optElement.querySelector('.status-icon').innerHTML = '✗';
                    }

                    // Show feedback & explanation
                    feedbackDiv.innerHTML = isCorrect ? 
                        `<strong>Correct!</strong> <br><br> ${item.explanation}` : 
                        `<strong>Incorrect.</strong> <br><br> ${item.explanation}`;
                    feedbackDiv.className = isCorrect ? 'feedback show correct-feedback' : 'feedback show incorrect-feedback';
                    
                    nextBtn.classList.add('show');
                    
                    // Trigger MathJax typesetting for dynamically injected content
                    if (window.MathJax) {
                        MathJax.typesetPromise([feedbackDiv]);
                    }
                });

                optionsDiv.appendChild(optElement);
            });

            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            
            const nextBtn = document.createElement('button');
            nextBtn.className = 'next-btn';
            nextBtn.innerText = index === quizData.length - 1 ? 'Finish Quiz' : 'Next Question ➔';
            
            nextBtn.addEventListener('click', () => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    loadQuestion(currentQuestion);
                } else {
                    showScore();
                }
            });

            const clearfix = document.createElement('div');
            clearfix.className = 'clearfix';

            card.appendChild(optionsDiv);
            card.appendChild(feedbackDiv);
            card.appendChild(nextBtn);
            card.appendChild(clearfix);
            
            container.appendChild(card);
            
            if (window.MathJax) {
                MathJax.typesetPromise([card]);
            }
        }

        function showScore() {
            container.style.display = 'none';
            progressText.style.display = 'none';
            introText.style.display = 'none';
            scoreContainer.style.display = 'block';
            finalScoreText.innerText = `${score} / ${quizData.length}`;
        }

        // Start the quiz
        loadQuestion(currentQuestion);

    </script>
</body>
</html>
