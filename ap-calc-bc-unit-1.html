<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Calculus BC - Unit 1: Limits & Continuity Quiz</title>
    <script>
        window.MathJax = {
          tex: {
            inlineMath: [['\\(', '\\)']],
            displayMath: [['\\[', '\\]']]
          }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #f5c6cb;
        }
        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: var(--bg); 
            color: #333; 
            line-height: 1.6; 
            padding: 20px; 
        }
        .container { 
            max-width: 850px; 
            margin: auto; 
            background: var(--card-bg); 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.1); 
        }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px;}
        h2 { text-align: center; color: #7f8c8d; font-weight: 400; font-size: 1.2em; margin-bottom: 40px; }
        .info-bar { 
            background: #e9ecef; 
            padding: 15px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
            font-size: 0.95em; 
            color: #555; 
            border-left: 4px solid var(--secondary); 
        }
        .question-card { 
            background: #fff; 
            border: 1px solid #e0e0e0;
            border-top: 5px solid var(--secondary); 
            padding: 25px; 
            margin-bottom: 30px; 
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .question-text { font-size: 1.15em; margin-bottom: 20px; font-weight: 500;}
        .options { list-style-type: none; padding: 0; }
        .options li { 
            margin-bottom: 12px; 
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .options li:hover { background: #eef2f5; }
        .options label { 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            padding: 12px 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .options input { margin-right: 15px; transform: scale(1.2); cursor: pointer; }
        .btn { 
            display: inline-block; 
            background: var(--secondary); 
            color: #fff; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 1em; 
            font-weight: bold;
            margin-top: 15px; 
            transition: background 0.3s; 
        }
        .btn:hover { background: #2980b9; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .feedback { 
            margin-top: 20px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
        }
        .correct { background: var(--correct-bg); color: #155724; border: 1px solid var(--correct-border); }
        .incorrect { background: var(--incorrect-bg); color: #721c24; border: 1px solid var(--incorrect-border); }
        .feedback-header { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; }
        .explanation { margin-top: 10px; font-weight: normal; font-size: 0.95em; line-height: 1.5; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AP Calculus BC Quiz</h1>
        <h2>Unit 1: Limits and Continuity</h2>
        <div class="info-bar">
            <strong>Instructions:</strong> This quiz contains 20 challenging multiple-choice questions focusing on Unit 1 of the AP Calculus BC curriculum. Select your answer and click "Check Answer" to receive immediate feedback and a detailed explanation.<br><br>
        </div>
        <div id="quiz-container"></div>
    </div>

    <script>
        const quizData = [{"question": "Evaluate \\(\\lim_{x \\to 0} \\frac{1 - \\cos(4x)}{x^2}\\).", "options": ["\\(2\\)", "\\(4\\)", "\\(8\\)", "\\(16\\)"], "correctIndex": 2, "explanation": "Using the small angle approximation or multiplying by \\(\\frac{1+\\cos(4x)}{1+\\cos(4x)}\\), we get \\(\\lim_{x \\to 0} \\frac{\\sin^2(4x)}{x^2(1+\\cos(4x))}\\). This simplifies to \\(\\frac{16}{2} = 8\\). Alternatively, applying L'H\u00f4pital's Rule twice yields 8."}, {"question": "Evaluate \\(\\lim_{x \\to \\infty} \\left( \\sqrt{x^2 - 5x} - x \\right)\\).", "options": ["\\(-\\frac{5}{2}\\)", "\\(0\\)", "\\(\\infty\\)", "\\(-5\\)"], "correctIndex": 0, "explanation": "Multiply and divide by the conjugate \\(\\sqrt{x^2 - 5x} + x\\). This gives \\(\\lim_{x \\to \\infty} \\frac{-5x}{\\sqrt{x^2 - 5x} + x}\\). Dividing numerator and denominator by \\(x\\) yields \\(\\frac{-5}{\\sqrt{1 - 5/x} + 1} = -\\frac{5}{2}\\)."}, {"question": "Let \\(f(x) = \\frac{x^2 - 9}{x^3 - 3x^2 + 2x - 6}\\). Determine the type of discontinuity at \\(x = 3\\).", "options": ["Jump Discontinuity", "Infinite Discontinuity", "Removable Discontinuity", "No Discontinuity"], "correctIndex": 2, "explanation": "Factor the denominator by grouping: \\(x^2(x-3) + 2(x-3) = (x^2+2)(x-3)\\). The numerator is \\((x-3)(x+3)\\). Since the \\((x-3)\\) terms cancel, \\(\\lim_{x \\to 3} f(x) = \\frac{6}{11}\\). Because the limit exists but \\(f(3)\\) is undefined, it is a removable discontinuity."}, {"question": "Evaluate \\(\\lim_{x \\to 0} \\frac{\\sin(\\sin x)}{x}\\).", "options": ["\\(0\\)", "\\(1\\)", "DNE", "\\(\\infty\\)"], "correctIndex": 1, "explanation": "Multiply the numerator and denominator by \\(\\sin x\\): \\(\\lim_{x \\to 0} \\left( \\frac{\\sin(\\sin x)}{\\sin x} \\cdot \\frac{\\sin x}{x} \\right)\\). As \\(x \\to 0\\), \\(\\sin x \\to 0\\). Thus, the limit is \\(1 \\cdot 1 = 1\\)."}, {"question": "Determine \\(\\lim_{x \\to 1^-} \\frac{x-1}{|x-1|}\\).", "options": ["\\(1\\)", "\\(-1\\)", "\\(0\\)", "DNE"], "correctIndex": 1, "explanation": "For \\(x < 1\\), the expression \\(x - 1\\) is negative, so \\(|x - 1| = -(x - 1)\\). Therefore, \\(\\frac{x-1}{-(x-1)} = -1\\). The left-sided limit is \\(-1\\)."}, {"question": "Find \\(\\lim_{x \\to \\infty} \\frac{4x^3 - 2x + 1}{\\sqrt{4x^6 - 3x^4}}\\).", "options": ["\\(2\\)", "\\(1\\)", "\\(4\\)", "\\(\\frac{1}{2}\\)"], "correctIndex": 0, "explanation": "Divide the numerator and denominator by \\(x^3\\). Inside the square root, this is equivalent to dividing by \\(x^6\\). The expression becomes \\(\\frac{4 - 2/x^2 + 1/x^3}{\\sqrt{4 - 3/x^2}}\\). As \\(x \\to \\infty\\), this approaches \\(\\frac{4}{\\sqrt{4}} = 2\\)."}, {"question": "Consider \\(f(x) = \\lfloor 2x \\rfloor\\), where \\(\\lfloor x \\rfloor\\) is the greatest integer function. Find \\(\\lim_{x \\to 1.5^-} f(x)\\).", "options": ["\\(1\\)", "\\(2\\)", "\\(3\\)", "\\(1.5\\)"], "correctIndex": 1, "explanation": "As \\(x\\) approaches \\(1.5\\) from the left (e.g., \\(x = 1.49\\)), \\(2x\\) approaches \\(3\\) from the left (e.g., \\(2.98\\)). The greatest integer less than or equal to \\(2.98\\) is \\(2\\)."}, {"question": "Evaluate \\(\\lim_{h \\to 0} \\frac{e^{2(\\ln 3 + h)} - e^{2\\ln 3}}{h}\\).", "options": ["\\(6\\)", "\\(9\\)", "\\(18\\)", "\\(e^6\\)"], "correctIndex": 2, "explanation": "This limit represents the derivative of \\(f(x) = e^{2x}\\) evaluated at \\(x = \\ln 3\\). Since \\(f'(x) = 2e^{2x}\\), we have \\(f'(\\ln 3) = 2e^{2\\ln 3} = 2(e^{\\ln 3})^2 = 2(3^2) = 18\\)."}, {"question": "Evaluate \\(\\lim_{x \\to 0} \\frac{e^x - e^{-x}}{2x}\\).", "options": ["\\(1\\)", "\\(\\frac{1}{2}\\)", "\\(0\\)", "DNE"], "correctIndex": 0, "explanation": "This limit represents the definition of the derivative of \\(f(x) = \\sinh(x)\\) at \\(x=0\\), or it can be split into \\(\\frac{1}{2}\\lim \\frac{e^x-1}{x} - \\frac{1}{2}\\lim \\frac{e^{-x}-1}{x} = \\frac{1}{2}(1) - \\frac{1}{2}(-1) = 1\\)."}, {"question": "For what value of \\(k\\) is the function continuous everywhere? <br> \\(f(x) = \\begin{cases} \\frac{\\sin(kx)}{x} & x < 0 \\\\ 3x + 4 & x \\ge 0 \\end{cases}\\)", "options": ["\\(0\\)", "\\(3\\)", "\\(4\\)", "\\(-4\\)"], "correctIndex": 2, "explanation": "For continuity at \\(x=0\\), the left-hand limit must equal the right-hand limit. \\(\\lim_{x \\to 0^-} \\frac{\\sin(kx)}{x} = k\\). \\(\\lim_{x \\to 0^+} (3x+4) = 4\\). Thus, \\(k = 4\\)."}, {"question": "Which of the following limits evaluates to \\(e^3\\)?", "options": ["\\(\\lim_{x \\to \\infty} \\left(1 + \\frac{1}{x}\\right)^3\\)", "\\(\\lim_{x \\to 0} (1 + 3x)^{1/x}\\)", "\\(\\lim_{x \\to \\infty} \\left(1 + \\frac{3}{x}\\right)^x\\)", "Both B and C"], "correctIndex": 3, "explanation": "The limit definition of \\(e^k\\) is \\(\\lim_{x \\to \\infty} (1 + k/x)^x\\) or \\(\\lim_{x \\to 0} (1 + kx)^{1/x}\\). Both options B and C match these forms for \\(k=3\\), so they both evaluate to \\(e^3\\)."}, {"question": "Find \\(\\lim_{x \\to \\infty} x \\left( \\frac{\\pi}{2} - \\arctan x \\right)\\).", "options": ["\\(1\\)", "\\(0\\)", "\\(\\frac{\\pi}{2}\\)", "\\(-1\\)"], "correctIndex": 0, "explanation": "Let \\(u = \\frac{\\pi}{2} - \\arctan x\\). As \\(x \\to \\infty\\), \\(u \\to 0^+\\). We also have \\(x = \\tan(\\frac{\\pi}{2} - u) = \\cot u\\). The limit becomes \\(\\lim_{u \\to 0^+} u \\cot u = \\lim_{u \\to 0^+} \\frac{u}{\\sin u} \\cos u = 1 \\cdot 1 = 1\\)."}, {"question": "Suppose \\(\\lim_{x \\to a} f(x) = L\\) and \\(\\lim_{x \\to a} g(x) = M\\), where \\(L\\) and \\(M\\) are real numbers. Which of the following MUST be true?<br>I. \\(\\lim_{x \\to a} [f(x)g(x)] = LM\\)<br>II. \\(\\lim_{x \\to a} \\frac{f(x)}{g(x)} = \\frac{L}{M}\\)<br>III. \\(f(a) = L\\)", "options": ["II only", "III only", "I and II only", "I only"], "correctIndex": 3, "explanation": "Statement I is always true by the limit product rule. Statement II is false if \\(M = 0\\). Statement III is false because \\(f(x)\\) may not be continuous at \\(x = a\\)."}, {"question": "Evaluate \\(\\lim_{x \\to 0} \\frac{\\sqrt{1+x} - 1}{x}\\).", "options": ["\\(1\\)", "\\(\\frac{1}{2}\\)", "\\(0\\)", "DNE"], "correctIndex": 1, "explanation": "Multiply the numerator and denominator by the conjugate \\(\\sqrt{1+x} + 1\\). The numerator becomes \\((1+x) - 1 = x\\). We get \\(\\lim_{x \\to 0} \\frac{x}{x(\\sqrt{1+x} + 1)} = \\lim_{x \\to 0} \\frac{1}{\\sqrt{1+x} + 1} = \\frac{1}{2}\\)."}, {"question": "Let \\(f\\) be continuous on \\([-2, 3]\\) such that \\(f(-2) = 5\\) and \\(f(3) = -1\\). The Intermediate Value Theorem guarantees that:", "options": ["\\(f(c) = 0\\) for exactly one \\(c \\in (-2, 3)\\)", "\\(f(c) = 2\\) for some \\(c \\in (-2, 3)\\)", "The absolute maximum of \\(f\\) on the interval is \\(5\\)", "\\(f'(c) = -\\frac{6}{5}\\) for some \\(c \\in (-2, 3)\\)"], "correctIndex": 1, "explanation": "The IVT guarantees that \\(f(x)\\) takes on all values between \\(f(3) = -1\\) and \\(f(-2) = 5\\) at least once in the interval. Since \\(2\\) is between \\(-1\\) and \\(5\\), \\(f(c) = 2\\) for some \\(c \\in (-2, 3)\\). It does not guarantee 'exactly one' root."}, {"question": "Evaluate \\(\\lim_{x \\to \\infty} \\frac{\\ln(x^4 + 1)}{\\ln(x^2 + 1)}\\).", "options": ["\\(1\\)", "\\(2\\)", "\\(4\\)", "\\(\\infty\\)"], "correctIndex": 1, "explanation": "As \\(x \\to \\infty\\), the \\(+1\\) terms become negligible. The limit behaves like \\(\\frac{\\ln(x^4)}{\\ln(x^2)} = \\frac{4\\ln x}{2\\ln x} = 2\\). L'H\u00f4pital's Rule can also be used to verify this."}, {"question": "Find the vertical asymptotes of \\(g(x) = \\frac{2x^2 + 5x - 3}{x^2 + 2x - 3}\\).", "options": ["\\(x = 1\\) and \\(x = -3\\)", "\\(x = 1\\) only", "\\(x = -3\\) only", "No vertical asymptotes"], "correctIndex": 1, "explanation": "Factor the function: \\(g(x) = \\frac{(2x-1)(x+3)}{(x-1)(x+3)}\\). There is a removable discontinuity (hole) at \\(x = -3\\). The remaining factor \\((x-1)\\) in the denominator creates a vertical asymptote at \\(x = 1\\)."}, {"question": "Let \\(f(x) = \\begin{cases} cx^2 + 2x & x < 2 \\\\ x^3 - cx & x \\ge 2 \\end{cases}\\). For what value of \\(c\\) is \\(f(x)\\) continuous at \\(x=2\\)?", "options": ["\\(\\frac{2}{3}\\)", "\\(\\frac{3}{2}\\)", "\\(\\frac{4}{3}\\)", "\\(1\\)"], "correctIndex": 0, "explanation": "Set the left-hand limit equal to the right-hand limit at \\(x = 2\\): \\(c(2)^2 + 2(2) = (2)^3 - c(2)\\). This simplifies to \\(4c + 4 = 8 - 2c\\). Solving yields \\(6c = 4 \\implies c = \\frac{2}{3}\\)."}, {"question": "Evaluate \\(\\lim_{x \\to 0} \\frac{x^2}{\\sec x - 1}\\).", "options": ["\\(1\\)", "\\(0\\)", "\\(2\\)", "DNE"], "correctIndex": 2, "explanation": "Multiply numerator and denominator by \\(\\cos x\\): \\(\\lim_{x \\to 0} \\frac{x^2 \\cos x}{1 - \\cos x}\\). Then multiply by the conjugate \\(1+\\cos x\\): \\(\\lim_{x \\to 0} \\frac{x^2 \\cos x(1+\\cos x)}{1-\\cos^2 x} = \\lim_{x \\to 0} \\frac{x^2}{\\sin^2 x} \\cos x (1+\\cos x) = 1 \\cdot 1 \\cdot 2 = 2\\)."}, {"question": "Evaluate \\(\\lim_{x \\to 0} x^4 \\cos\\left(\\frac{2}{x}\\right)\\).", "options": ["\\(1\\)", "\\(2\\)", "DNE", "\\(0\\)"], "correctIndex": 3, "explanation": "Using the Squeeze Theorem, since \\(-1 \\le \\cos\\left(\\frac{2}{x}\\right) \\le 1\\), we have \\(-x^4 \\le x^4 \\cos\\left(\\frac{2}{x}\\right) \\le x^4\\). As \\(x \\to 0\\), both \\(-x^4\\) and \\(x^4\\) approach \\(0\\). Therefore, the limit is \\(0\\)."}];
        const quizContainer = document.getElementById('quiz-container');

        quizData.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            let optionsHtml = '';
            const labels = ['A', 'B', 'C', 'D'];
            q.options.forEach((opt, i) => {
                optionsHtml += `
                    <li>
                        <label>
                            <input type="radio" name="q${index}" value="${i}">
                            <span><strong>${labels[i]}.</strong> ${opt}</span>
                        </label>
                    </li>
                `;
            });

            card.innerHTML = `
                <div class="question-text"><strong>Question ${index + 1}:</strong> ${q.question}</div>
                <ul class="options">${optionsHtml}</ul>
                <button class="btn" id="btn${index}" onclick="checkAnswer(${index})">Check Answer</button>
                <div class="feedback" id="feedback${index}"></div>
            `;
            quizContainer.appendChild(card);
        });

        function checkAnswer(index) {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feedbackDiv = document.getElementById(`feedback${index}`);
            const btn = document.getElementById(`btn${index}`);
            
            if (!selected) {
                alert("Please select an answer before checking.");
                return;
            }

            const selectedValue = parseInt(selected.value);
            const q = quizData[index];
            
            feedbackDiv.style.display = 'block';
            
            if (selectedValue === q.correctIndex) {
                feedbackDiv.className = 'feedback correct';
                feedbackDiv.innerHTML = `
                    <div class="feedback-header">✅ Correct!</div>
                    <div class="explanation"><strong>Explanation:</strong><br>${q.explanation}</div>
                `;
            } else {
                const labels = ['A', 'B', 'C', 'D'];
                feedbackDiv.className = 'feedback incorrect';
                feedbackDiv.innerHTML = `
                    <div class="feedback-header">❌ Incorrect. The correct answer is ${labels[q.correctIndex]}.</div>
                    <div class="explanation"><strong>Explanation:</strong><br>${q.explanation}</div>
                `;
            }

            // Disable inputs after checking
            const radios = document.querySelectorAll(`input[name="q${index}"]`);
            radios.forEach(r => r.disabled = true);
            btn.disabled = true;
            
            // Re-render MathJax
            if (window.MathJax) {
                MathJax.typesetPromise([feedbackDiv]).catch(function (err) {
                    console.log('MathJax processing error: ' + err.message);
                });
            }
        }
    </script>
</body>
</html>
