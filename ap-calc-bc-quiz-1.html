<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Calculus BC - Hard Mock Quiz</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --bg: #f4f7f6;
            --text: #333;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 3px solid var(--accent);
            padding-bottom: 10px;
        }
        .quiz-info {
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
            color: #666;
        }
        .question-container {
            margin-bottom: 40px;
            padding: 20px;
            border-left: 5px solid var(--accent);
            background: #fafafa;
            display: none;
        }
        .question-container.active {
            display: block;
        }
        .question-text {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        .options {
            list-style-type: none;
            padding: 0;
        }
        .option {
            background: #fff;
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option:hover {
            background: #f0f8ff;
            border-color: var(--accent);
        }
        .option.selected {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        button {
            padding: 10px 25px;
            border: none;
            border-radius: 5px;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            font-size: 1em;
        }
        button:hover {
            background-color: var(--secondary);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        #result-area {
            text-align: center;
            display: none;
        }
        .score {
            font-size: 2em;
            font-weight: bold;
            color: var(--accent);
        }
        .math {
            font-family: 'Courier New', Courier, monospace;
            background: #eee;
            padding: 2px 4px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AP Calculus BC Challenge Quiz</h1>
    <div class="quiz-info">20 Difficult Multiple Choice Questions</div>

    <div id="quiz-wrapper">
        <!-- Questions will be injected here by JS -->
    </div>

    <div class="controls">
        <button id="prev-btn" onclick="changeQuestion(-1)" disabled>Previous</button>
        <span id="q-counter">Question 1 of 20</span>
        <button id="next-btn" onclick="changeQuestion(1)">Next</button>
        <button id="submit-btn" onclick="showResults()" style="display:none;">Submit Quiz</button>
    </div>

    <div id="result-area">
        <h2>Your Results</h2>
        <div class="score" id="final-score"></div>
        <p id="score-commentary"></p>
        <button onclick="location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
const quizData = [
    {
        q: "What is the limit as x approaches 0 of (sin(x) - x + x^3/6) / x^5?",
        a: ["1/120", "1/24", "0", "1/6"],
        correct: 0
    },
    {
        q: "The Taylor series for ln(x) centered at x=1 is used to approximate ln(1.5). What is the maximum error using the first three non-zero terms based on Taylor's Inequality?",
        a: ["1/64", "1/24", "1/192", "1/48"],
        correct: 2
    },
    {
        q: "Find the length of the curve defined by x = e^t * cos(t) and y = e^t * sin(t) from t=0 to t=1.",
        a: ["sqrt(2)(e-1)", "e-1", "sqrt(2)e", "2(e-1)"],
        correct: 0
    },
    {
        q: "Which of the following series converges absolutely?",
        a: ["Σ (-1)^n / n", "Σ (-1)^n / sqrt(n)", "Σ (-1)^n * (n^2 / e^n)", "Σ sin(n) / n"],
        correct: 2
    },
    {
        q: "Evaluate the integral from 0 to infinity of x * e^(-x^2) dx.",
        a: ["1/2", "1", "sqrt(π)/2", "Diverges"],
        correct: 0
    },
    {
        q: "A particle moves in the xy-plane with velocity v(t) = (t^2, sin(t^2)). What is the acceleration vector at t = sqrt(π)?",
        a: ["(2sqrt(π), -2sqrt(π))", "(2sqrt(π), 0)", "(sqrt(π), -1)", "(0, -2sqrt(π))"],
        correct: 0
    },
    {
        q: "For what values of p does the series Σ (n^p) / (n! + 1) converge?",
        a: ["p > 1 only", "p < 0 only", "All real values of p", "No values of p"],
        correct: 2
    },
    {
        q: "What is the radius of convergence of the power series Σ ( (n!)^2 / (2n)! ) * x^n?",
        a: ["1", "4", "e", "Infinity"],
        correct: 1
    },
    {
        q: "If dy/dx = y(2-y) and y(0) = 1, what is the limit of y(x) as x approaches infinity?",
        a: ["0", "1", "2", "Infinity"],
        correct: 2
    },
    {
        q: "The area of the region inside the polar curve r = 3cos(θ) and outside r = 1 + cos(θ) is given by:",
        a: ["∫[0,π/3] ( (3cosθ)^2 - (1+cosθ)^2 ) dθ", "∫[-π/3,π/3] 1/2 ( (3cosθ)^2 - (1+cosθ)^2 ) dθ", "∫[0,π/2] (3cosθ - 1 - cosθ) dθ", "2 * ∫[0,π/3] (3cosθ - 1 - cosθ) dθ"],
        correct: 1
    },
    {
        q: "Using Euler's Method with h=0.5 for dy/dx = x + y with y(0)=1, what is the approximation for y(1)?",
        a: ["2.25", "2.75", "3.0", "1.5"],
        correct: 1
    },
    {
        q: "What is the interval of convergence for Σ (x-2)^n / (n * 3^n)?",
        a: ["(-1, 5)", "[-1, 5)", "(-1, 5]", "[-1, 5]"],
        correct: 1
    },
    {
        q: "Evaluate ∫ x^2 * sin(x) dx.",
        a: ["-x^2 cosx + 2x sinx + 2cosx + C", "x^2 cosx - 2x sinx + C", "-x^2 cosx - 2x sinx - 2cosx + C", "x^2 sinx + 2x cosx + C"],
        correct: 0
    },
    {
        q: "The sum of the series 1 - 1/3! + 1/5! - 1/7! + ... is:",
        a: ["e", "cos(1)", "sin(1)", "ln(2)"],
        correct: 2
    },
    {
        q: "What is the slope of the tangent line to the polar curve r = 2 + sin(θ) at θ = π/2?",
        a: ["0", "1", "-1", "Undefined"],
        correct: 0
    },
    {
        q: "Which test would be most effective in determining the convergence of Σ (n^n) / (n! * 3^n)?",
        a: ["P-series Test", "Ratio Test", "Integral Test", "Alternating Series Test"],
        correct: 1
    },
    {
        q: "Find the volume of the solid generated by revolving the region bounded by y=1/x, y=0, x=1, and x=e about the y-axis.",
        a: ["2π(e-1)", "π(e-1)", "2π", "π/2"],
        correct: 0
    },
    {
        q: "The 3rd degree Maclaurin polynomial for f(x) = e^(2x) is:",
        a: ["1 + 2x + 2x^2 + 4/3 x^3", "1 + x + x^2/2 + x^3/6", "1 + 2x + 4x^2 + 8x^3", "2x + 2x^2 + 4/3 x^3"],
        correct: 0
    },
    {
        q: "Identify the type of conic section represented by the polar equation r = 4 / (2 + 3cosθ).",
        a: ["Circle", "Ellipse", "Parabola", "Hyperbola"],
        correct: 3
    },
    {
        q: "If f(x) = ∫[0, x^2] sin(t^2) dt, then f'(x) is:",
        a: ["sin(x^4)", "2x * sin(x^4)", "sin(x^2)", "2x * sin(x^2)"],
        correct: 1
    }
];

let currentQuestion = 0;
let userAnswers = new Array(quizData.length).fill(null);

function loadQuiz() {
    const wrapper = document.getElementById('quiz-wrapper');
    quizData.forEach((data, index) => {
        const qDiv = document.createElement('div');
        qDiv.className = `question-container ${index === 0 ? 'active' : ''}`;
        qDiv.id = `q-${index}`;
        
        qDiv.innerHTML = `
            <div class="question-text">${index + 1}. ${data.q}</div>
            <ul class="options">
                ${data.a.map((opt, i) => `
                    <li class="option" onclick="selectOption(${index}, ${i})" id="opt-${index}-${i}">
                        ${opt}
                    </li>
                `).join('')}
            </ul>
        `;
        wrapper.appendChild(qDiv);
    });
}

function selectOption(qIdx, optIdx) {
    userAnswers[qIdx] = optIdx;
    
    // UI Update
    const options = document.querySelectorAll(`#q-${qIdx} .option`);
    options.forEach(opt => opt.classList.remove('selected'));
    document.getElementById(`opt-${qIdx}-${optIdx}`).classList.add('selected');
}

function changeQuestion(step) {
    document.getElementById(`q-${currentQuestion}`).classList.remove('active');
    currentQuestion += step;
    document.getElementById(`q-${currentQuestion}`).classList.add('active');
    
    // Update buttons
    document.getElementById('prev-btn').disabled = currentQuestion === 0;
    
    if (currentQuestion === quizData.length - 1) {
        document.getElementById('next-btn').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'inline-block';
    } else {
        document.getElementById('next-btn').style.display = 'inline-block';
        document.getElementById('submit-btn').style.display = 'none';
    }
    
    document.getElementById('q-counter').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
}

function showResults() {
    let score = 0;
    userAnswers.forEach((ans, i) => {
        if (ans === quizData[i].correct) score++;
    });

    document.getElementById('quiz-wrapper').style.display = 'none';
    document.querySelector('.controls').style.display = 'none';
    
    const resultArea = document.getElementById('result-area');
    resultArea.style.display = 'block';
    
    const scoreVal = (score / quizData.length) * 100;
    document.getElementById('final-score').innerText = `${score} / ${quizData.length} (${scoreVal}%)`;
    
    let comment = "";
    if (scoreVal >= 90) comment = "Excellent! You are ready for a 5 on the BC exam.";
    else if (scoreVal >= 70) comment = "Great job. Keep practicing Series and Polar coordinates.";
    else if (scoreVal >= 50) comment = "Good start, but you need more review on advanced BC topics.";
    else comment = "Focus on the BC-only topics like Taylor Series and Parametrics.";
    
    document.getElementById('score-commentary').innerText = comment;
}

loadQuiz();
</script>

</body>
</html>
