<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced AP Chinese Practice Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        #quiz-container {
            background: white;
            width: 100%;
            max-width: 800px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #2c3e50; }
        .question { margin-bottom: 25px; display: none; }
        .question.active { display: block; }
        .options { list-style: none; padding: 0; }
        .options li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .options li:hover { background: #e2e6ea; border-color: #adb5bd; }
        .options li.correct { background: #d4edda; border-color: #c3e6cb; color: #155724; }
        .options li.wrong { background: #f8d7da; border-color: #f5c6cb; color: #721c24; }
        #feedback { margin-top: 15px; font-weight: bold; min-height: 24px; }
        #controls { margin-top: 20px; text-align: right; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled { background: #ccc; }
        #score-display { text-align: center; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div id="quiz-container">
    <h1>AP Chinese Advanced Quiz</h1>
    <hr>
    <div id="quiz-body">
        <div id="question-area"></div>
        <div id="feedback"></div>
        <div id="controls">
            <button id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
        </div>
    </div>
    <div id="result-area" style="display:none;">
        <h2>Quiz Completed!</h2>
        <p id="score-display"></p>
        <button onclick="location.reload()">Restart Quiz</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "下列哪个词语最适合描述‘得而复失’的心情？", o: ["患得患失", "怅然若失", "虚左以待", "意气风发"], a: 1 },
        { q: "‘他在学术界的地位是不可___的。’ 请选择最合适的词：", o: ["动弹", "动摇", "撼动", "振动"], a: 2 },
        { q: "以下哪句话中的‘意思’是指‘某种趋势或苗头’？", o: ["这天气有点要下雨的意思。", "他这话是什么意思？", "这点小礼物只是我的一点意思。", "这电影看来看去没意思。"], a: 0 },
        { q: "‘与其临渊羡鱼，不如退而结网’ 这句话强调的是：", o: ["观察的重要性", "环境的限制", "采取实际行动", "等待时机"], a: 2 },
        { q: "成语‘破釜沉舟’源自于哪位历史人物？", o: ["刘邦", "项羽", "曹操", "诸葛亮"], a: 1 },
        { q: "‘既然你已经决定了，___别人怎么说，你都要坚持下去。’", o: ["尽管", "由于", "不管", "何况"], a: 2 },
        { q: "在正式的书面语中，表示‘死亡’且带有敬意的词是：", o: ["断气", "逝世", "去世", "玩儿完"], a: 1 },
        { q: "‘他的演说精辟透彻，真可谓___。’", o: ["入木三分", "走马观花", "画蛇添足", "盲人摸象"], a: 0 },
        { q: "‘他虽然家徒四壁，但从来不觉得自卑。’ 中‘家徒四壁’的意思是：", o: ["房子很大", "家里装修很好", "非常贫穷", "喜欢独居"], a: 2 },
        { q: "‘这件事情非同小可，你一定要慎重处理。’ 中‘非同小可’的意思是：", o: ["不重要", "非常重要/严重", "体积很小", "和别人不一样"], a: 1 },
        { q: "下列哪项不是端午节的习俗？", o: ["吃粽子", "赛龙舟", "挂菖蒲", "赏月"], a: 3 },
        { q: "‘墨守成规’中的‘墨’最初是指哪位思想家？", o: ["孔子", "墨子", "老子", "庄子"], a: 1 },
        { q: "‘他做事向来___，从不拖泥带水。’", o: ["优柔寡断", "干脆利落", "小心翼翼", "丢三落四"], a: 1 },
        { q: "‘这篇文章写得非常好，简直是___。’", o: ["妙笔生花", "枯燥无味", "千篇一律", "粗心大意"], a: 0 },
        { q: "‘他为了这件事___，费尽了心思。’", o: ["绞尽脑汁", "不动脑筋", "如鱼得水", "谈笑风生"], a: 0 },
        { q: "‘司空见惯’常用来形容：", o: ["非常罕见的事情", "经常看到，不足为奇", "非常宏伟的建筑", "很有学问的人"], a: 1 },
        { q: "‘他的行为已经触犯了法律，迟早会___。’", o: ["逍遥法外", "绳之以法", "法外开恩", "无法无天"], a: 1 },
        { q: "‘纸上谈兵’这个成语比喻：", o: ["喜欢写文章", "空谈理论，不能解决问题", "军事才能卓越", "在纸上画地图"], a: 1 },
        { q: "‘这简直是___，完全是浪费时间。’", o: ["劳而无功", "事半功倍", "大功告成", "勤能补拙"], a: 0 },
        { q: "‘老骥伏枥，志在千里’ 表达了什么样的情感？", o: ["悲观厌世", "志向远大", "思念故乡", "恐惧死亡"], a: 1 }
    ];

    let currentQuestion = 0;
    let score = 0;
    let answered = false;

    const questionArea = document.getElementById('question-area');
    const feedback = document.getElementById('feedback');
    const nextBtn = document.getElementById('next-btn');

    function loadQuestion() {
        answered = false;
        feedback.innerText = "";
        nextBtn.disabled = true;
        const data = quizData[currentQuestion];
        
        let html = `<div class="question active">
                        <h3>${currentQuestion + 1}. ${data.q}</h3>
                        <ul class="options">`;
        
        data.o.forEach((option, index) => {
            html += `<li onclick="checkAnswer(this, ${index})">${option}</li>`;
        });

        html += `</ul></div>`;
        questionArea.innerHTML = html;
    }

    function checkAnswer(element, index) {
        if (answered) return;
        answered = true;
        const correctAnswer = quizData[currentQuestion].a;
        const options = document.querySelectorAll('.options li');

        if (index === correctAnswer) {
            element.classList.add('correct');
            feedback.innerHTML = "<span style='color:green;'>正确！(Correct!)</span>";
            score++;
        } else {
            element.classList.add('wrong');
            options[correctAnswer].classList.add('correct');
            feedback.innerHTML = `<span style='color:red;'>错误。(Wrong.) 正确答案是: ${quizData[currentQuestion].o[correctAnswer]}</span>`;
        }
        nextBtn.disabled = false;
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('quiz-body').style.display = 'none';
        const resultArea = document.getElementById('result-area');
        resultArea.style.display = 'block';
        document.getElementById('score-display').innerText = `Your Score: ${score} / ${quizData.length}`;
    }

    loadQuestion();
</script>

</body>
</html>
