<!DOCTYPE html>
<html lang="en">
<head>

        :root {
            --primary: #1a2a3a;
            --secondary: #2c3e50;
            --accent: #e67e22;
            --success: #27ae60;
            --danger: #c0392b;
            --light: #f4f4f4;
            --text: #2c3e50;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #dee2e6; color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: var(--primary); text-align: center; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        button { padding: 15px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 6px; transition: all 0.2s; }
        .btn-topic { background-color: var(--secondary); color: white; }
        .btn-mixed { background-color: var(--primary); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .scoreboard { display: flex; justify-content: space-between; background: var(--primary); color: white; padding: 15px; border-radius: 6px; margin-bottom: 25px; font-family: monospace; }
        .question-box { font-size: 18px; line-height: 1.6; margin-bottom: 25px; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .option-item { padding: 15px; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; transition: background 0.2s; position: relative; }
        .option-item:hover { background-color: #f8f9fa; border-color: var(--accent); }
        .selected { border-color: var(--accent); background-color: #fff4e6; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .explanation { margin-top: 20px; padding: 20px; background-color: #e3f2fd; border-left: 6px solid #2196f3; display: none; }
        .btn-submit { background-color: var(--accent); color: white; width: 100%; margin-top: 20px; }
        .btn-next { background-color: var(--success); color: white; width: 100%; margin-top: 20px; display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen">
        <h1>PMP® Extreme Challenge Simulator</h1>
        <p style="text-align:center; color: #666;">Expert-level scenarios focusing on "Best Action," situational ambiguity, and hybrid integration.</p>
        
        <div class="menu-grid">
            <button class="btn-topic" onclick="startQuiz('people')">Domain I: People (Expert)</button>
            <button class="btn-topic" onclick="startQuiz('process')">Domain II: Process (Expert)</button>
            <button class="btn-topic" onclick="startQuiz('business')">Domain III: Business (Expert)</button>
            <button class="btn-topic" onclick="startQuiz('agile')">Agile/Hybrid (Expert)</button>
        </div>
        <div class="menu-grid" style="margin-top:0">
            <button class="btn-mixed" onclick="startQuiz('mixed1')">Hard Simulation A (45 Qs)</button>
            <button class="btn-mixed" onclick="startQuiz('mixed2')">Hard Simulation B (45 Qs)</button>
            <button class="btn-mixed" onclick="startQuiz('mixed3')">Hard Simulation C (45 Qs)</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="scoreboard">
            <span id="progress">Q: 1/10</span>
            <span id="score-display">Correct: 0 (0%)</span>
        </div>
        <div class="question-box">
            <div id="question-text"></div>
            <div id="instruction-text" style="font-size:14px; margin-top:10px; color:var(--accent); font-weight:bold;"></div>
        </div>
        <div id="options-list" class="options-list"></div>
        <div id="explanation-box" class="explanation"></div>
        <button id="submit-btn" class="btn-submit" onclick="checkAnswer()">Evaluate Selection</button>
        <button id="next-btn" class="btn-next" onclick="nextQuestion()">Proceed to Next Question</button>
    </div>

    <div id="result-screen" class="hidden">
        <h2 style="text-align:center">Performance Summary</h2>
        <div id="final-score" style="font-size: 32px; text-align: center; margin: 30px 0; font-weight:bold;"></div>
        <button class="btn-topic" style="width:100%" onclick="location.reload()">Reset Simulator</button>
    </div>
</div>

    let pool = [];
    pools.forEach(p => pool = pool.concat(quizData[p]));
    quizData[`mixed${m}`] = pool.sort(() => 0.5 - Math.random()).slice(0, 45);
}

let currentQuiz = [];
let currentIndex = 0;
let score = 0;
let selectedOptions = [];

function startQuiz(topic) {
    currentQuiz = quizData[topic];
    currentIndex = 0;
    score = 0;
    document.getElementById('home-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    document.getElementById('result-screen').classList.add('hidden');
    showQuestion();
}

function showQuestion() {
    const q = currentQuiz[currentIndex];
    selectedOptions = [];
    document.getElementById('progress').innerText = `Q: ${currentIndex + 1}/${currentQuiz.length}`;
    updateScoreboard();
    
    document.getElementById('question-text').innerText = q.q;
    
    let instr = "Select the single BEST action.";
    if(q.type === 'multiple') instr = `Select the BEST ${q.count} actions. This is a multi-select question.`;
    document.getElementById('instruction-text').innerText = instr;

    const list = document.getElementById('options-list');
    list.innerHTML = '';
    q.options.forEach((opt, idx) => {
        const div = document.createElement('div');
        div.className = 'option-item';
        div.innerText = opt;
        div.onclick = () => selectOption(idx, div);
        list.appendChild(div);
    });

    document.getElementById('explanation-box').style.display = 'none';
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('next-btn').style.display = 'none';
}

function selectOption(idx, element) {
    const q = currentQuiz[currentIndex];
    if(q.type === 'single') {
        selectedOptions = [idx];
        Array.from(document.getElementsByClassName('option-item')).forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
    } else {
        if(selectedOptions.includes(idx)) {
            selectedOptions = selectedOptions.filter(i => i !== idx);
            element.classList.remove('selected');
        } else if(selectedOptions.length < q.count) {
            selectedOptions.push(idx);
            element.classList.add('selected');
        }
    }
}

function checkAnswer() {
    const q = currentQuiz[currentIndex];
    if(selectedOptions.length === 0 || (q.type === 'multiple' && selectedOptions.length !== q.count)) {
        alert(`Please select ${q.type === 'multiple' ? q.count : 'an'} answer(s).`);
        return;
    }

    const items = document.getElementsByClassName('option-item');
    const sortedSelected = [...selectedOptions].sort();
    const sortedAnswers = [...q.answer].sort();
    const isCorrect = JSON.stringify(sortedSelected) === JSON.stringify(sortedAnswers);

    if(isCorrect) score++;

    // Visual feedback
    Array.from(items).forEach((item, idx) => {
        if(q.answer.includes(idx)) item.classList.add('correct');
        else if(selectedOptions.includes(idx)) item.classList.add('wrong');
    });

    const exp = document.getElementById('explanation-box');
    exp.innerHTML = `<strong>Result: ${isCorrect ? 'CORRECT' : 'INCORRECT'}</strong><hr>${q.explanation}`;
    exp.style.display = 'block';

    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'block';
    updateScoreboard();
}

function updateScoreboard() {
    const percent = currentIndex === 0 ? 0 : Math.round((score / (currentIndex + 1)) * 100);
    document.getElementById('score-display').innerText = `Correct: ${score} (${percent}%)`;
}

function nextQuestion() {
    currentIndex++;
    if(currentIndex < currentQuiz.length) {
        showQuestion();
    } else {
        showResults();
    }
}

function showResults() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('result-screen').classList.remove('hidden');
    const percent = Math.round((score / currentQuiz.length) * 100);
    document.getElementById('final-score').innerText = `${percent}% (${score}/${currentQuiz.length})`;
}
</script>
