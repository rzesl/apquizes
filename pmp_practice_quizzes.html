<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Mastery - Unique Simulations v4</title>
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --bg: #f1f5f9; --card: #ffffff; --success: #15803d; --danger: #b91c1c; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 20px auto; background: var(--card); padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .sub { text-align: center; color: #64748b; margin-bottom: 30px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        button { padding: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; font-size: 14px; }
        .btn-topic { background: #e2e8f0; color: #1e293b; }
        .btn-sim { background: var(--primary); color: white; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        .scoreboard { background: #1e293b; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; margin-bottom: 25px; }
        .q-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 20px; font-weight: 500; }
        .option { padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; cursor: pointer; }
        .option:hover { border-color: var(--accent); }
        .selected { border-color: var(--accent); background: #fffbeb; }
        .correct { background: #dcfce7 !important; border-color: var(--success) !important; color: var(--success); font-weight: bold; }
        .wrong { background: #fee2e2 !important; border-color: var(--danger) !important; color: var(--danger); }
        .explanation-box { padding: 20px; background: #eff6ff; border-left: 5px solid #3b82f6; margin-top: 20px; display: none; line-height: 1.5; }
        .action-btn { width: 100%; padding: 18px; font-size: 1rem; background: var(--accent); color: white; margin-top: 20px; border-radius: 8px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="home">
        <h1>PMP Extreme Simulator</h1>
        <p class="sub">175 Unique Questions | Expert Level Explanations</p>
        
        <h3>Domain Focus (10 Qs)</h3>
        <div class="menu-grid">
            <button class="btn-topic" onclick="start('people')">People</button>
            <button class="btn-topic" onclick="start('process')">Process</button>
            <button class="btn-topic" onclick="start('business')">Business Environment</button>
            <button class="btn-topic" onclick="start('agile')">Agile/Hybrid</button>
        </div>

        <h3>Mixed Simulations (45 Qs)</h3>
        <div class="menu-grid">
            <button class="btn-sim" onclick="start('sim1')">Simulation Alpha</button>
            <button class="btn-sim" onclick="start('sim2')">Simulation Beta</button>
            <button class="btn-sim" onclick="start('sim3')">Simulation Gamma</button>
        </div>
    </div>

    <div id="quiz" class="hidden">
        <div class="scoreboard">
            <span id="prog">Q: 1/45</span>
            <span id="score">Score: 0%</span>
        </div>
        <div id="q-text" class="q-text"></div>
        <div id="options"></div>
        
        <div id="exp-container" class="explanation-box">
            <strong id="result-label"></strong>
            <p id="exp-text" style="margin-top:8px"></p>
        </div>

        <button id="submit" class="action-btn" onclick="check()">Submit Answer</button>
        <button id="next" class="action-btn hidden" style="background:var(--success)" onclick="next()">Next Question</button>
    </div>

    <div id="results" class="hidden" style="text-align:center">
        <h2>Quiz Results</h2>
        <h1 id="final-percent" style="font-size:3.5rem; color:var(--accent); margin:10px 0">0%</h1>
        <p id="final-details"></p>
        <button class="btn-sim" style="width:100%" onclick="location.reload()">Back to Menu</button>
    </div>
</div>

let set = [];
let i = 0;
let score = 0;
let sel = null;

function start(k) {
    set = quizData[k];
    i = 0; score = 0;
    document.getElementById('home').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    load();
}

function load() {
    const q = set[i];
    sel = null;
    document.getElementById('prog').innerText = `Question ${i + 1} of ${set.length}`;
    document.getElementById('q-text').innerText = q.q;
    const box = document.getElementById('options');
    box.innerHTML = '';
    
    q.options.forEach((o, idx) => {
        const d = document.createElement('div');
        d.className = 'option';
        d.innerText = o;
        d.onclick = () => {
            if(document.getElementById('submit').classList.contains('hidden')) return;
            Array.from(box.children).forEach(c => c.classList.remove('selected'));
            d.classList.add('selected');
            sel = idx;
        };
        box.appendChild(d);
    });

    document.getElementById('exp-container').style.display = 'none';
    document.getElementById('submit').classList.remove('hidden');
    document.getElementById('next').classList.add('hidden');
}

function check() {
    if(sel === null) return alert("Please select an option.");
    const q = set[i];
    const correct = q.answer.includes(sel);
    if(correct) score++;

    const opts = document.getElementById('options').children;
    q.answer.forEach(aIdx => opts[aIdx].classList.add('correct'));
    if(!correct) opts[sel].classList.add('wrong');

    document.getElementById('result-label').innerText = correct ? "Correct!" : "Incorrect";
    document.getElementById('result-label').style.color = correct ? "var(--success)" : "var(--danger)";
    document.getElementById('exp-text').innerText = q.explanation;
    document.getElementById('exp-container').style.display = 'block';

    document.getElementById('submit').classList.add('hidden');
    document.getElementById('next').classList.remove('hidden');
    document.getElementById('score').innerText = `Score: ${Math.round((score/(i+1))*100)}%`;
}

function next() {
    i++;
    if(i < set.length) load();
    else finish();
}

function finish() {
    document.getElementById('quiz').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    const p = Math.round((score/set.length)*100);
    document.getElementById('final-percent').innerText = p + '%';
    document.getElementById('final-details').innerText = `You answered ${score} out of ${set.length} questions correctly.`;
}
</script>
