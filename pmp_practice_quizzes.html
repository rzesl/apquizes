<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>PMP Master Simulation - Unique Sets</title>
    <style>
        :root { --primary: #0f172a; --accent: #f59e0b; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 850px; margin: 20px auto; background: var(--card); padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
        .nav-header { text-align: center; border-bottom: 2px solid #e2e8f0; margin-bottom: 30px; padding-bottom: 20px; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        button { padding: 16px; font-weight: 600; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; }
        .btn-topic { background: #64748b; color: white; }
        .btn-sim { background: var(--primary); color: white; }
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .scoreboard { background: #1e293b; color: white; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; margin-bottom: 20px; font-family: monospace; }
        .question-text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; font-weight: 500; }
        .option { padding: 15px; border: 2px solid #e2e8f0; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .option:hover { border-color: var(--accent); background: #fffbeb; }
        .selected { border-color: var(--accent); background: #fff7ed; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }
        .explanation { padding: 20px; background: #f1f5f9; border-left: 4px solid #3b82f6; margin-top: 20px; display: none; }
        .hidden { display: none; }
        .action-btn { width: 100%; padding: 16px; font-size: 1rem; background: var(--accent); color: white; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="home">
        <div class="nav-header">
            <h1>PMP Ultimate Simulator</h1>
            <p>175 Unique Questions. Zero Overlap between Topic Quizzes and Simulations.</p>
        </div>
        <h3>Targeted Domain Practice (10 Qs)</h3>
        <div class="menu-grid">

            <button class="btn-topic" onclick="startQuiz('business')">Domain III: Business</button>

            <button class="btn-sim" onclick="startQuiz('sim2')">Simulation B (Set 2)</button>
            <button class="btn-sim" onclick="startQuiz('sim3')">Simulation C (Set 3)</button>
        </div>
    </div>

    <div id="quiz" class="hidden">
        <div class="scoreboard">
            <span id="prog">Q: 1/45</span>
            <span id="score">Score: 0%</span>
        </div>
        <div id="q-box">
            <div class="question-text" id="q-text"></div>
            <div id="options" class="options-container"></div>

        <div id="exp" class="explanation"></div>
        <button id="submit" class="action-btn" onclick="check()">Submit Answer</button>
        <button id="next" class="action-btn hidden" style="background:#22c55e" onclick="next()">Next Question</button>
    </div>

    <div id="results" class="hidden" style="text-align:center">

let currentSet = [];
let idx = 0;
let score = 0;
let selections = [];

function startQuiz(key) {
    currentSet = quizData[key];
    idx = 0; score = 0;
    document.getElementById('home').classList.add('hidden');
    document.getElementById('quiz').classList.remove('hidden');
    showQ();
}

function showQ() {
    const q = currentSet[idx];
    selections = [];
    document.getElementById('prog').innerText = `Q: ${idx + 1}/${currentSet.length}`;
    document.getElementById('q-text').innerText = q.q;
    const optBox = document.getElementById('options');
    optBox.innerHTML = '';
    
    q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = opt;
        div.onclick = () => {
            if(q.type === 'single') {
                selections = [i];
                Array.from(optBox.children).forEach(c => c.classList.remove('selected'));
                div.classList.add('selected');
            } else {
                if(selections.includes(i)) selections = selections.filter(x => x !== i);
                else if(selections.length < (q.count || 2)) selections.push(i);
                div.classList.toggle('selected');
            }
        };
        optBox.appendChild(div);
    });
    
    document.getElementById('exp').classList.add('hidden');
    document.getElementById('submit').classList.remove('hidden');
    document.getElementById('next').classList.add('hidden');
}

function check() {
    if(selections.length === 0) return alert("Select an answer");
    const q = currentSet[idx];
    const isCorrect = JSON.stringify(selections.sort()) === JSON.stringify(q.answer.sort());
    if(isCorrect) score++;
    
    const opts = document.getElementById('options').children;
    q.answer.forEach(i => opts[i].classList.add('correct'));
    selections.forEach(i => { if(!q.answer.includes(i)) opts[i].classList.add('wrong'); });
    
    const exp = document.getElementById('explanation');
    document.getElementById('exp').innerHTML = `<strong>${isCorrect ? 'Correct' : 'Incorrect'}</strong><br>${q.explanation}`;
    document.getElementById('exp').classList.remove('hidden');
    document.getElementById('submit').classList.add('hidden');
    document.getElementById('next').classList.remove('hidden');
    
    document.getElementById('score').innerText = `Score: ${Math.round((score/(idx+1))*100)}%`;
}

function next() {
    idx++;
    if(idx < currentSet.length) showQ();
    else {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('results').classList.remove('hidden');
        document.getElementById('final-percent').innerText = Math.round((score/currentSet.length)*100) + '%';
        document.getElementById('final-stat').innerText = `Correct Answers: ${score} / ${currentSet.length}`;
    }
}
</script>
