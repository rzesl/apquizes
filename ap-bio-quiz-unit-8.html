<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Biology Unit 8 Quiz: Ecology</title>
    <style>
        :root {
            --primary: #2e8b57;
            --secondary: #3cb371;
            --correct: #27ae60;
            --incorrect: #c0392b;
            --bg: #f4f9f4;
            --text: #2c3e50;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            border-bottom: 3px solid var(--secondary);
            padding-bottom: 15px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 1.15em;
            margin-bottom: 30px;
        }
        .progress-bar-bg {
            background-color: #ecf0f1;
            border-radius: 8px;
            height: 12px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background-color: var(--primary);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }
        .question-box {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }
        .question-box.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .q-text {
            font-size: 1.25em;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text);
            line-height: 1.5;
        }
        .options-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .option {
            background: #f8f9fa;
            border: 2px solid #dde1e5;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.05em;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }
        .option:hover:not(.locked) {
            background: #e8f6ed;
            border-color: var(--secondary);
        }
        .option.correct {
            background: #eafaf1;
            border-color: var(--correct);
            color: #1d8348;
            font-weight: 500;
        }
        .option.incorrect {
            background: #fdedec;
            border-color: var(--incorrect);
            color: #922b21;
            font-weight: 500;
        }
        .option.locked {
            cursor: not-allowed;
            opacity: 0.8;
        }
        .feedback {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-size: 1.05em;
            line-height: 1.6;
            border-left: 5px solid;
            background: #fdfafb;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 35px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
        .q-counter {
            font-weight: 600;
            color: #7f8c8d;
            font-size: 1.1em;
        }
        .btn {
            padding: 12px 30px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.05em;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn:hover:not(:disabled) {
            background-color: #1e603b;
        }
        .btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }
        #result-screen {
            display: none;
            text-align: center;
        }
        .score-display {
            font-size: 5em;
            font-weight: bold;
            color: var(--primary);
            margin: 20px 0;
        }
        .commentary {
            font-size: 1.2em;
            color: var(--text);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-ui">
        <h1>Unit 8: Ecology</h1>
        <div class="subtitle">Populations, Communities, Ecosystems, and Responses to the Environment</div>
        
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progress-bar"></div>
        </div>

        <div id="quiz-container"></div>

        <div class="controls">
            <div class="q-counter" id="q-counter">Question 1 / 20</div>
            <button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next Question</button>
            <button class="btn" id="finish-btn" onclick="showResults()" style="display:none;">Finish Quiz</button>
        </div>
    </div>

    <div id="result-screen">
        <h1>Quiz Complete!</h1>
        <div class="score-display" id="final-score"></div>
        <div class="commentary" id="commentary"></div>
        <button class="btn" onclick="location.reload()">Take Quiz Again</button>
    </div>
</div>

<script>
const quizData = [
    {
        q: "In an ecosystem, which of the following is most accurately described by the term 'net primary productivity' (NPP)?",
        opts: [
            "A. The total amount of chemical energy stored by autotrophs minus the energy they use for their own cellular respiration.",
            "B. The total amount of solar energy converted to chemical energy by autotrophs in a given area.",
            "C. The efficiency with which herbivores convert plant biomass into animal biomass.",
            "D. The total biomass of all organisms (producers and consumers) in an ecosystem."
        ],
        ans: 0, // A
        exp: "NPP is the energy that actually remains in the producers after they have used some of the energy they created (Gross Primary Productivity, GPP) for their own metabolic needs (respiration, R). Formula: NPP = GPP - R."
    },
    {
        q: "A population of paramecia is placed in a test tube with a constant daily supply of nutrients. The population grows rapidly at first, then levels off and remains relatively stable. Which of the following mathematical models best describes this growth?",
        opts: [
            "A. Exponential growth model (dN/dt = rN)",
            "B. Logistic growth model (dN/dt = rmaxN((K-N)/K))",
            "C. Lotka-Volterra predator-prey model",
            "D. Hardy-Weinberg equilibrium model"
        ],
        ans: 1, // B
        exp: "Logistic growth occurs when a population's growth slows and eventually stops as it approaches the carrying capacity (K) of the environment, resulting in an S-shaped curve."
    },
    {
        q: "Oysters produce millions of eggs in a single spawning event. However, the vast majority of the larvae are eaten or fail to find a suitable substrate to attach to, resulting in very high early mortality. The few that survive to adulthood generally live a long time. What type of survivorship curve do oysters exhibit?",
        opts: [
            "A. Type I",
            "B. Type II",
            "C. Type III",
            "D. Type IV"
        ],
        ans: 2, // C
        exp: "A Type III survivorship curve represents organisms that produce large numbers of offspring with little to no parental care, resulting in massive early mortality, but high survivorship for the few that reach adulthood."
    },
    {
        q: "Which of the following is the best example of a density-independent limiting factor on a population?",
        opts: [
            "A. Competition for nesting sites among a population of seabirds.",
            "B. The spread of a highly contagious viral disease through a dense herd of elk.",
            "C. The depletion of the food supply in a lake heavily populated with carp.",
            "D. An unseasonal, severe frost that kills a large percentage of an insect population."
        ],
        ans: 3, // D
        exp: "Density-independent factors affect a population regardless of its size or density. Natural disasters, severe weather (like a frost), and climatic shifts are classic examples."
    },
    {
        q: "Two species of barnacles, *Chthamalus* and *Balanus*, can both survive on the lower rocks of the intertidal zone. However, *Balanus* grows faster and pries *Chthamalus* off the rocks. Consequently, *Chthamalus* is only found higher up where *Balanus* cannot survive desiccation. This scenario illustrates:",
        opts: [
            "A. Competitive exclusion restricting *Chthamalus* to its realized niche.",
            "B. Commensalism between the two barnacle species.",
            "C. Primary succession in the intertidal zone.",
            "D. Biomagnification of resources."
        ],
        ans: 0, // A
        exp: "The fundamental niche of *Chthamalus* includes both the upper and lower intertidal zones. However, due to competitive exclusion by *Balanus*, *Chthamalus* is restricted to its realized niche (the upper zone)."
    },
    {
        q: "In a kelp forest ecosystem, sea otters prey heavily on sea urchins. Sea urchins feed on kelp. When sea otters were hunted to near extinction, the sea urchin population exploded, devastating the kelp forests and the many species that rely on them. In this ecosystem, the sea otter is a:",
        opts: [
            "A. Primary producer",
            "B. Keystone species",
            "C. Pioneer species",
            "D. Primary consumer"
        ],
        ans: 1, // B
        exp: "A keystone species exerts strong control on community structure not by numerical might, but by its pivotal ecological role. Removing it causes a dramatic shift or collapse in the entire community structure."
    },
    {
        q: "A volcanic eruption completely covers an island with fresh lava rock, destroying all life and soil. Over hundreds of years, lichens and mosses establish themselves, break down the rock into soil, and eventually pave the way for a climax community of trees. This process is called:",
        opts: [
            "A. Secondary succession",
            "B. Eutrophication",
            "C. Primary succession",
            "D. Adaptive radiation"
        ],
        ans: 2, // C
        exp: "Primary succession occurs in completely lifeless areas where there is no soil (like on fresh lava flows or retreating glaciers). Secondary succession occurs when a disturbance leaves the soil intact (like after a forest fire)."
    },
    {
        q: "According to the equilibrium model of island biogeography developed by MacArthur and Wilson, which of the following islands would likely have the HIGHEST species richness?",
        opts: [
            "A. A small island far from the mainland",
            "B. A small island close to the mainland",
            "C. A large island far from the mainland",
            "D. A large island close to the mainland"
        ],
        ans: 3, // D
        exp: "Large islands have lower extinction rates (more resources/habitats), and islands close to the mainland have higher immigration rates. Therefore, a large, close island will reach equilibrium at the highest number of species."
    },
    {
        q: "Newly hatched ducklings will instinctively follow the first moving object they see, usually their mother. If a human is the first moving object they see, they will follow the human. This behavior, which occurs during a critical period, is known as:",
        opts: [
            "A. Imprinting",
            "B. Classical conditioning",
            "C. Habituation",
            "D. Operant conditioning"
        ],
        ans: 0, // A
        exp: "Imprinting is a type of behavior that includes both learned and innate components. It is generally irreversible and must occur during a specific, limited time known as the sensitive (or critical) period."
    },
    {
        q: "Which of the following describes a 'top-down' model of community control (a trophic cascade)?",
        opts: [
            "A. An increase in soil nutrients leads to more plant growth, which supports more herbivores and carnivores.",
            "B. An increase in apex predators reduces the herbivore population, allowing the primary producer population to flourish.",
            "C. A drought reduces primary productivity, leading to the starvation of herbivores and predators.",
            "D. Competition between two herbivore species leads to the extinction of one."
        ],
        ans: 1, // B
        exp: "In a top-down model (trophic cascade), predation mainly controls community organization. Predators limit herbivores, which in turn relieves grazing pressure on the producers."
    },
    {
        q: "Simpson's Diversity Index is used to measure the biodiversity of a habitat. What two factors does this index take into account?",
        opts: [
            "A. Temperature and precipitation ranges.",
            "B. The size of the ecosystem and the carrying capacity.",
            "C. Species richness (number of species) and species evenness (relative abundance of each species).",
            "D. The number of producers and the number of apex predators."
        ],
        ans: 2, // C
        exp: "Biodiversity isn't just about how many different species are present (richness); it's also about how evenly the individuals are distributed among those species (evenness). Simpson's Index mathematically combines both."
    },
    {
        q: "How does the increasing concentration of atmospheric carbon dioxide specifically contribute to ocean acidification?",
        opts: [
            "A. It depletes the ozone layer, allowing more UV radiation to penetrate the ocean surface and heat the water.",
            "B. It triggers massive algal blooms that release toxic acidic byproducts during decomposition.",
            "C. It binds with calcium carbonate, precipitating it out of the water column.",
            "D. It dissolves in seawater to form carbonic acid, which dissociates and lowers the pH, reducing carbonate availability for calcifying organisms."
        ],
        ans: 3, // D
        exp: "CO2 reacts with water to form carbonic acid (H2CO3), which releases H+ ions, lowering the ocean's pH. These excess H+ ions combine with carbonate (CO3 2-), making it harder for corals and mollusks to build their shells."
    },
    {
        q: "Nitrogen gas (N2) makes up 78% of the Earth's atmosphere, yet it is often a limiting nutrient in terrestrial ecosystems. Why is this?",
        opts: [
            "A. N2 molecules are held together by a strong triple covalent bond that most organisms cannot break; it must first be fixed by specific bacteria.",
            "B. N2 gas escapes Earth's gravity and is constantly being lost to space.",
            "C. Plants only absorb nitrogen through their leaves during the night.",
            "D. Atmospheric nitrogen is highly toxic until it is diluted by rainfall."
        ],
        ans: 0, // A
        exp: "Plants and animals cannot use atmospheric nitrogen (N2) directly. It must be 'fixed' (converted to ammonia or nitrate) by nitrogen-fixing bacteria (like *Rhizobium* in legume root nodules) before it can be assimilated into biological molecules."
    },
    {
        q: "DDT was a pesticide widely used in the mid-20th century. While it was sprayed at very low concentrations, bald eagles suffered massive population declines because the chemical weakened their eggshells. This occurred due to:",
        opts: [
            "A. Competitive exclusion",
            "B. Biological magnification (Biomagnification)",
            "C. Secondary succession",
            "D. Resource partitioning"
        ],
        ans: 1, // B
        exp: "Biomagnification occurs when toxins (like DDT) that are fat-soluble and not easily degraded become more concentrated in successive trophic levels of a food web. Apex predators, like eagles, accumulate the highest, most toxic doses."
    },
    {
        q: "An r-selected species typically possesses which of the following life-history traits?",
        opts: [
            "A. Late age of first reproduction and heavy investment in a few offspring.",
            "B. A Type I survivorship curve.",
            "C. Early age of first reproduction, high number of offspring, and little to no parental care.",
            "D. Stable population size that remains very close to the carrying capacity."
        ],
        ans: 2, // C
        exp: "r-selected species maximize their intrinsic rate of increase (r). They live in unstable environments where it's advantageous to reproduce quickly and abundantly. Examples include insects, weeds, and many rodents."
    },
    {
        q: "In a terrestrial ecosystem, the gross primary productivity (GPP) is 10,000 J/m²/yr, and the respiration of the producers is 4,000 J/m²/yr. Assuming a standard 10% ecological efficiency, approximately how much energy is typically available to the SECONDARY consumers?",
        opts: [
            "A. 6,000 J/m²/yr",
            "B. 1,000 J/m²/yr",
            "C. 600 J/m²/yr",
            "D. 60 J/m²/yr"
        ],
        ans: 3, // D
        exp: "First, find NPP: 10,000 (GPP) - 4,000 (R) = 6,000 J/m²/yr available to primary consumers. Due to the 10% rule, primary consumers transfer ~10% (600 J) to secondary consumers. Thus, secondary consumers get 60 J/m²/yr (10% of 600)."
    },
    {
        q: "Five species of insectivorous warblers live in the same spruce trees. However, they manage to coexist without driving one another to extinction because each species forages in a slightly different region of the tree. This is an example of:",
        opts: [
            "A. Resource partitioning",
            "B. Mutualism",
            "C. The bottleneck effect",
            "D. Character displacement"
        ],
        ans: 0, // A
        exp: "Resource partitioning is the differentiation of ecological niches, enabling similar species to coexist in a community. By foraging in different parts of the tree, the warblers avoid direct competition."
    },
    {
        q: "Runoff from agricultural fields carrying excess fertilizers (nitrogen and phosphorus) into a lake frequently results in a massive die-off of fish. What is the direct cause of the fish death?",
        opts: [
            "A. The fertilizer chemicals directly poison the fish's nervous system.",
            "B. The nutrients cause an algal bloom; when the algae die, decomposing bacteria consume all the dissolved oxygen, suffocating the fish.",
            "C. The excess nutrients cause the fish to over-reproduce, leading to mass starvation.",
            "D. The phosphorus reacts with water to form a strong acid, lowering the lake's pH to lethal levels."
        ],
        ans: 1, // B
        exp: "This process is called eutrophication. The nutrients cause an explosion of algae. When the algae eventually die, the massive population of aerobic bacteria that decompose them depletes the water of oxygen (hypoxia), killing the fish."
    },
    {
        q: "Habitat fragmentation often breaks a large, continuous population into a metapopulation. In a metapopulation model, what is critical to maintaining the genetic diversity and long-term survival of the species across the fragmented landscape?",
        opts: [
            "A. Strictly preventing any individuals from migrating between the patches.",
            "B. Ensuring that each subpopulation undergoes sympatric speciation.",
            "C. Maintaining habitat corridors to allow for gene flow and the recolonization of empty patches.",
            "D. Eradicating all predators from the fragmented areas."
        ],
        ans: 2, // C
        exp: "A metapopulation is a 'population of populations' connected by dispersal. Habitat corridors allow individuals to migrate between fragmented patches, maintaining gene flow and rescuing smaller populations from local extinction."
    },
    {
        q: "A species of ground squirrel emits a loud alarm call when a predator is spotted. The caller draws attention to itself, increasing its own risk of predation, but allows its nearby relatives to escape. This seemingly disadvantageous behavior is best explained by:",
        opts: [
            "A. Classical conditioning",
            "B. Habituation",
            "C. Symbiosis",
            "D. Kin selection and inclusive fitness"
        ],
        ans: 3, // D
        exp: "Altruistic behavior can evolve if the cost to the individual is outweighed by the benefit to its close relatives, who share many of the same genes. By saving its relatives, the squirrel is still ensuring its genes are passed on (inclusive fitness)."
    }
];

let currentIndex = 0;
let score = 0;
let hasAnswered = false;

function buildQuiz() {
    const container = document.getElementById('quiz-container');
    quizData.forEach((qObj, index) => {
        const box = document.createElement('div');
        box.className = `question-box ${index === 0 ? 'active' : ''}`;
        box.id = `qbox-${index}`;
        
        let optionsHTML = '';
        qObj.opts.forEach((optText, oIdx) => {
            optionsHTML += `<li class="option" id="opt-${index}-${oIdx}" onclick="checkAnswer(${index}, ${oIdx})">${optText}</li>`;
        });

        box.innerHTML = `
            <div class="q-text">${index + 1}. ${qObj.q}</div>
            <ul class="options-list">${optionsHTML}</ul>
            <div class="feedback" id="fb-${index}"></div>
        `;
        container.appendChild(box);
    });
    updateProgressBar();
}

function checkAnswer(qIdx, selectedIdx) {
    if (hasAnswered) return;
    hasAnswered = true;
    
    const correctIdx = quizData[qIdx].ans;
    const fb = document.getElementById(`fb-${qIdx}`);
    const nextBtn = document.getElementById('next-btn');
    const finishBtn = document.getElementById('finish-btn');
    
    // Lock all options
    for(let i = 0; i < 4; i++){
        document.getElementById(`opt-${qIdx}-${i}`).classList.add('locked');
    }

    if (selectedIdx === correctIdx) {
        document.getElementById(`opt-${qIdx}-${selectedIdx}`).classList.add('correct');
        fb.innerHTML = `<strong>Correct!</strong> ${quizData[qIdx].exp}`;
        fb.style.borderColor = "var(--correct)";
        fb.style.color = "#1d8348";
        score++;
    } else {
        document.getElementById(`opt-${qIdx}-${selectedIdx}`).classList.add('incorrect');
        document.getElementById(`opt-${qIdx}-${correctIdx}`).classList.add('correct');
        fb.innerHTML = `<strong>Incorrect.</strong> ${quizData[qIdx].exp}`;
        fb.style.borderColor = "var(--incorrect)";
        fb.style.color = "#922b21";
    }
    
    fb.style.display = 'block';

    if (currentIndex === quizData.length - 1) {
        finishBtn.style.display = 'inline-block';
        nextBtn.style.display = 'none';
    } else {
        nextBtn.disabled = false;
    }
}

function nextQuestion() {
    document.getElementById(`qbox-${currentIndex}`).classList.remove('active');
    currentIndex++;
    document.getElementById(`qbox-${currentIndex}`).classList.add('active');
    
    document.getElementById('q-counter').innerText = `Question ${currentIndex + 1} / ${quizData.length}`;
    document.getElementById('next-btn').disabled = true;
    hasAnswered = false;
    updateProgressBar();
}

function updateProgressBar() {
    const pct = (currentIndex / quizData.length) * 100;
    document.getElementById('progress-bar').style.width = pct + '%';
}

function showResults() {
    document.getElementById('quiz-ui').style.display = 'none';
    const res = document.getElementById('result-screen');
    res.style.display = 'block';
    
    const pct = Math.round((score / quizData.length) * 100);
    document.getElementById('final-score').innerText = `${score} / ${quizData.length} (${pct}%)`;
    
    const comm = document.getElementById('commentary');
    if (pct >= 90) {
        comm.innerText = "Exceptional work! You have mastered Unit 8 Ecology.";
    } else if (pct >= 75) {
        comm.innerText = "Great job! You have a strong grasp of population dynamics, community interactions, and energy flow.";
    } else if (pct >= 60) {
        comm.innerText = "Good effort. Be sure to review energy transfer calculations, biogeochemical cycles, and behavioral ecology.";
    } else {
        comm.innerText = "Keep studying! Focus on differentiating density-dependent vs independent factors, and understanding human impacts like eutrophication.";
    }
}

// Initialize the quiz
buildQuiz();
</script>

</body>
</html>
