<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AP Chinese Interactive Quizzes</title>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f5f7fa;
        color: #333;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 800px;
        margin: 0 auto;
        background: #fff;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1 {
        text-align: center;
        color: #2c3e50;
    }
    .menu {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-top: 30px;
    }
    .menu button {
        padding: 15px;
        font-size: 18px;
        background-color: #3498db;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
    }
    .menu button:hover {
        background-color: #2980b9;
    }
    #quiz-section {
        display: none;
    }
    .question-card {
        margin-bottom: 25px;
        padding: 20px;
        border: 1px solid #e1e8ed;
        border-radius: 8px;
        background-color: #fafbfc;
    }
    .question-title {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
    }
    .options {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .option-btn {
        padding: 10px;
        font-size: 16px;
        background-color: #ecf0f1;
        border: 2px solid #bdc3c7;
        border-radius: 5px;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s;
    }
    .option-btn:hover {
        background-color: #e0e6ed;
    }
    .option-btn.correct {
        background-color: #d4edda;
        border-color: #28a745;
        color: #155724;
    }
    .option-btn.incorrect {
        background-color: #f8d7da;
        border-color: #dc3545;
        color: #721c24;
    }
    .option-btn:disabled {
        cursor: not-allowed;
    }
    .feedback {
        margin-top: 10px;
        padding: 10px;
        border-radius: 5px;
        display: none;
        font-weight: bold;
    }
    .feedback.success {
        background-color: #d4edda;
        color: #155724;
        display: block;
    }
    .feedback.error {
        background-color: #f8d7da;
        color: #721c24;
        display: block;
    }
    .controls {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .back-btn, .score-btn {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .back-btn {
        background-color: #95a5a6;
        color: white;
    }
    .back-btn:hover { background-color: #7f8c8d; }
    .score-btn {
        background-color: #2ecc71;
        color: white;
        display: none;
    }
    .score-btn:hover { background-color: #27ae60; }
    #score-display {
        font-size: 24px;
        font-weight: bold;
        color: #2c3e50;
        margin-top: 20px;
        text-align: center;
        display: none;
    }
</style>
</head>
<body>

<div class="container">
    <div id="menu-section">
        <h1>AP Chinese Interactive Quizzes</h1>
        <p style="text-align:center;">Select a unit to start your practice. Each quiz contains 10 questions.</p>
        <div class="menu" id="menu-container">
            <!-- Menu buttons injected by JS -->
        </div>
    </div>

    <div id="quiz-section">
        <h2 id="quiz-title">Unit Title</h2>
        <div id="questions-container">
            <!-- Questions injected by JS -->
        </div>
        <div class="controls">
            <button class="back-btn" onclick="showMenu()">Back to Menu</button>
            <button class="score-btn" id="finish-btn" onclick="showScore()">Finish & See Score</button>
        </div>
        <div id="score-display"></div>
    </div>
</div>

                { q: "Which word means 'to Recycle'?", options: ["A. 扔掉 (rēngdiào)", "B. 回收 (huíshōu)", "C. 浪费 (làngfèi)", "D. 破坏 (pòhuài)"], correct: 1, exp: "回收 (huíshōu) means to recycle or reclaim materials." },
                { q: "What is the Chinese term for 'Economy'?", options: ["A. 政治 (zhèngzhì)", "B. 文化 (wénhuà)", "C. 经济 (jīngjì)", "D. 社会 (shèhuì)"], correct: 2, exp: "经济 (jīngjì) means economy, a major global topic." },
                { q: "How do you say 'Population'?", options: ["A. 人口 (rénkǒu)", "B. 人民 (rénmín)", "C. 人类 (rénlèi)", "D. 人群 (rénqún)"], correct: 0, exp: "人口 (rénkǒu) means population (literally 'person mouths')." },
                { q: "Which word means 'Poverty'?", options: ["A. 富裕 (fùyù)", "B. 贫困 (pínkùn)", "C. 发展 (fāzhǎn)", "D. 落后 (luòhòu)"], correct: 1, exp: "贫困 (pínkùn) or 贫穷 (pínqióng) refers to poverty." },
                { q: "What does '和平 (hépíng)' mean?", options: ["A. War", "B. Conflict", "C. Peace", "D. Justice"], correct: 2, exp: "和平 (hépíng) means peace." },
                { q: "How do you say 'International'?", options: ["A. 国内 (guónèi)", "B. 国家 (guójiā)", "C. 全球 (quánqiú)", "D. 国际 (guójì)"], correct: 3, exp: "国际 (guójì) means international." },
                { q: "What is the term for 'Energy' (e.g., renewable energy)?", options: ["A. 能源 (néngyuán)", "B. 力量 (lìliàng)", "C. 电力 (diànlì)", "D. 资源 (zīyuán)"], correct: 0, exp: "能源 (néngyuán) refers to energy sources." },
                { q: "How do you say 'Challenge'?", options: ["A. 机会 (jīhuì)", "B. 危险 (wēixiǎn)", "C. 困难 (kùnnan)", "D. 挑战 (tiǎozhàn)"], correct: 3, exp: "挑战 (tiǎozhàn) means a challenge, as in Global Challenges (全球挑战)." }
            ]
        }
    };

    let currentUnit = null;
    let currentScore = 0;
    let questionsAnswered = 0;

    // Initialize Menu
    const menuContainer = document.getElementById('menu-container');
    for (const key in quizData) {
        const btn = document.createElement('button');
        btn.textContent = quizData[key].title;
        btn.onclick = () => startQuiz(key);
        menuContainer.appendChild(btn);
    }

    function showMenu() {
        document.getElementById('menu-section').style.display = 'block';
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-display').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'none';
    }

    function startQuiz(unitKey) {
        currentUnit = unitKey;
        currentScore = 0;
        questionsAnswered = 0;
        
        const quiz = quizData[unitKey];
        document.getElementById('quiz-title').textContent = quiz.title;
        
        const qContainer = document.getElementById('questions-container');
        qContainer.innerHTML = ''; // clear previous
        
        quiz.questions.forEach((qObj, qIndex) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            const qTitle = document.createElement('div');
            qTitle.className = 'question-title';
            qTitle.textContent = `${qIndex + 1}. ${qObj.q}`;
            card.appendChild(qTitle);
            
            const optionsDiv = document.createElement('div');
            optionsDiv.className = 'options';
            
            qObj.options.forEach((optText, optIndex) => {
                const optBtn = document.createElement('button');
                optBtn.className = 'option-btn';
                optBtn.textContent = optText;
                optBtn.onclick = function() {
                    handleAnswer(this, qIndex, optIndex, card);
                };
                optionsDiv.appendChild(optBtn);
            });
            
            card.appendChild(optionsDiv);
            
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = 'feedback';
            card.appendChild(feedbackDiv);
            
            qContainer.appendChild(card);
        });

        document.getElementById('menu-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        document.getElementById('score-display').style.display = 'none';
        document.getElementById('finish-btn').style.display = 'none';
    }

    function handleAnswer(btn, qIndex, optIndex, card) {
        const quiz = quizData[currentUnit];
        const question = quiz.questions[qIndex];
        const isCorrect = (optIndex === question.correct);
        
        // Disable all buttons in this card
        const allBtns = card.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);
        
        const feedbackDiv = card.querySelector('.feedback');
        
        if (isCorrect) {
            btn.classList.add('correct');
            feedbackDiv.textContent = `Correct! ${question.exp}`;
            feedbackDiv.classList.add('success');
            currentScore++;
        } else {
            btn.classList.add('incorrect');
            // Highlight correct answer
            allBtns[question.correct].classList.add('correct');
            feedbackDiv.textContent = `Incorrect! ${question.exp}`;
            feedbackDiv.classList.add('error');
        }
        
        questionsAnswered++;
        if (questionsAnswered === quiz.questions.length) {
            document.getElementById('finish-btn').style.display = 'block';
        }
    }

    function showScore() {
        const scoreDisplay = document.getElementById('score-display');
        scoreDisplay.textContent = `You scored ${currentScore} out of 10!`;
        scoreDisplay.style.display = 'block';
        document.getElementById('finish-btn').style.display = 'none';
    }

</script>

</body>
</html>
