<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP Calculus BC - Unit 3 Quiz</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; color: #333; margin: 0; padding: 0; }
        .container { max-width: 800px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-top: 5px solid #8e44ad; }
        h1 { text-align: center; color: #2c3e50; }
        p.intro { text-align: center; color: #7f8c8d; }
        .question-container { display: none; }
        .question-container.active { display: block; animation: fadeIn 0.4s; }
        .question { font-size: 1.25em; margin-bottom: 20px; font-weight: 500; }
        .options { list-style: none; padding: 0; }
        .option { background: #fdfdfd; border: 2px solid #e1e4e8; padding: 15px; margin-bottom: 10px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 1.1em; display: flex; align-items: center; }
        .option-label { font-weight: bold; margin-right: 15px; background: #8e44ad; color: white; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
        .option:hover:not(.disabled) { background: #f1f3f5; border-color: #d1d5da; }
        .option.selected { border-color: #8e44ad; background: #f4ecf7; }
        .option.correct { border-color: #2ecc71; background: #eafaf1; }
        .option.correct .option-label { background: #27ae60; }
        .option.incorrect { border-color: #e74c3c; background: #fdedec; }
        .option.incorrect .option-label { background: #c0392b; }
        .option.disabled { pointer-events: none; opacity: 0.9; }
        .btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; min-height: 50px; }
        .btn { background: #8e44ad; color: #fff; border: none; padding: 12px 25px; font-size: 1.1em; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: #732d91; }
        .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        #feedback { font-size: 1.1em; font-weight: bold; flex-grow: 1; }
        .text-correct { color: #27ae60; }
        .text-incorrect { color: #c0392b; }
        .results-container { display: none; text-align: center; }
        .score-display { font-size: 3.5em; color: #8e44ad; font-weight: bold; margin: 20px 0; }
        .progress { margin-bottom: 20px; font-size: 1em; font-weight: bold; color: #7f8c8d; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>AP Calculus BC Unit 3 Quiz</h1>
        <p class="intro" id="intro-text">Differentiation: Composite, Implicit, and Inverse Functions</p>
        
        <div id="quiz">
            <div class="progress">Question <span id="current-q-num">1</span> of 20</div>
            <div id="question-wrapper"></div>
            <div class="btn-container">
                <div id="feedback"></div>
                <div>
                    <button class="btn" id="submit-btn" disabled>Submit Answer</button>
                    <button class="btn" id="next-btn" style="display: none;">Next Question</button>
                </div>
            </div>
        </div>

        <div class="results-container" id="results">
            <h2>Quiz Complete!</h2>
            <p>Your Final Score:</p>
            <div class="score-display"><span id="score-val"></span> / 20</div>
            <button class="btn" onclick="location.reload()">Retake Quiz</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "Let \\( h(x) = f(g(x)) \\). Given \\( g(2)=3 \\), \\( g'(2)=-1 \\), and \\( f'(3)=4 \\). Find \\( h'(2) \\).",
                options: ["\\( -4 \\)", "\\( 4 \\)", "\\( -1 \\)", "\\( 3 \\)"],
                answer: 0,
                exp: "Using the chain rule: \\( h'(x) = f'(g(x))g'(x) \\). Thus, \\( h'(2) = f'(g(2))g'(2) = f'(3)(-1) = 4(-1) = -4 \\)."
            },
            {
                q: "Let \\( f(x) = x^3 + 2x - 1 \\). Let \\( g \\) be the inverse function of \\( f \\). Find \\( g'(2) \\).",
                options: ["\\( 5 \\)", "\\( \\frac{1}{5} \\)", "\\( -\\frac{1}{5} \\)", "\\( \\frac{1}{2} \\)"],
                answer: 1,
                exp: "First find \\( x \\) such that \\( f(x) = 2 \\). By inspection, \\( x=1 \\) works since \\( 1^3+2(1)-1=2 \\). Since \\( g'(2) = \\frac{1}{f'(1)} \\) and \\( f'(x) = 3x^2+2 \\), we have \\( f'(1)=5 \\). Therefore, \\( g'(2) = 1/5 \\)."
            },
            {
                q: "Find \\( \\frac{dy}{dx} \\) for \\( x^2 y + y^2 = 8 \\) at the point \\( (2, 2) \\).",
                options: ["\\( 1 \\)", "\\( 0 \\)", "\\( -1 \\)", "\\( -8 \\)"],
                answer: 2,
                exp: "Differentiate implicitly: \\( 2xy + x^2 y' + 2y y' = 0 \\). At (2,2), we get \\( 2(2)(2) + 4y' + 4y' = 0 \\implies 8 + 8y' = 0 \\implies y' = -1 \\)."
            },
            {
                q: "Find the derivative of \\( y = \\arcsin(3x) \\).",
                options: [
                    "\\( \\frac{1}{\\sqrt{1-9x^2}} \\)",
                    "\\( \\frac{-3}{\\sqrt{1-9x^2}} \\)",
                    "\\( \\frac{3}{1+9x^2} \\)",
                    "\\( \\frac{3}{\\sqrt{1-9x^2}} \\)"
                ],
                answer: 3,
                exp: "Using the chain rule and the derivative of arcsine: \\( y' = \\frac{1}{\\sqrt{1-(3x)^2}} \\cdot \\frac{d}{dx}(3x) = \\frac{3}{\\sqrt{1-9x^2}} \\)."
            },
            {
                q: "If \\( x^2 + y^2 = 25 \\), find \\( \\frac{d^2y}{dx^2} \\) at the point \\( (3, 4) \\).",
                options: ["\\( -\\frac{25}{64} \\)", "\\( \\frac{25}{64} \\)", "\\( -\\frac{3}{64} \\)", "\\( -\\frac{9}{16} \\)"],
                answer: 0,
                exp: "First derivative: \\( 2x + 2yy' = 0 \\implies y' = -\\frac{x}{y} \\). At (3,4), \\( y' = -\\frac{3}{4} \\). Second derivative: \\( y'' = \\frac{-y + xy'}{y^2} = \\frac{-4 + 3(-3/4)}{16} = \\frac{-25/4}{16} = -\\frac{25}{64} \\)."
            },
            {
                q: "Let \\( y = e^{\\ln(x^2+1)} \\). Find \\( y' \\).",
                options: ["\\( x^2+1 \\)", "\\( 2x \\)", "\\( e^{x^2+1} \\)", "\\( \\frac{2x}{x^2+1} \\)"],
                answer: 1,
                exp: "Simplify first using logarithm properties: \\( e^{\\ln(u)} = u \\). Thus, \\( y = x^2+1 \\). The derivative is simply \\( y' = 2x \\)."
            },
            {
                q: "Let \\( f(x) = \\arctan(e^x) \\). Find \\( f'(0) \\).",
                options: ["\\( 1 \\)", "\\( 0 \\)", "\\( \\frac{1}{2} \\)", "\\( \\frac{\\pi}{4} \\)"],
                answer: 2,
                exp: "\\( f'(x) = \\frac{1}{1+(e^x)^2} \\cdot e^x = \\frac{e^x}{1+e^{2x}} \\). Evaluated at \\( x=0 \\), we get \\( \\frac{1}{1+1} = \\frac{1}{2} \\)."
            },
            {
                q: "Find \\( \\frac{dy}{dx} \\) for \\( \\sin(xy) = x \\).",
                options: [
                    "\\( \\frac{1}{x\\cos(xy)} \\)",
                    "\\( \\frac{1 - y\\cos(xy)}{x\\cos(xy)} \\)",
                    "\\( \\frac{1 - y\\cos(xy)}{x} \\)",
                    "\\( \\frac{\\cos(xy) - y}{x} \\)"
                ],
                answer: 1,
                exp: "Implicit differentiation: \\( \\cos(xy)(1 \\cdot y + x y') = 1 \\). Distribute: \\( y\\cos(xy) + x\\cos(xy)y' = 1 \\). Isolate \\( y' \\): \\( x\\cos(xy)y' = 1 - y\\cos(xy) \\implies y' = \\frac{1 - y\\cos(xy)}{x\\cos(xy)} \\)."
            },
            {
                q: "Let \\( f(x) = \\sin^3(2x) \\). Find \\( f'(\\pi/8) \\).",
                options: ["\\( \\frac{3\\sqrt{2}}{2} \\)", "\\( \\frac{3}{2} \\)", "\\( 3\\sqrt{2} \\)", "\\( \\frac{\\sqrt{2}}{2} \\)"],
                answer: 0,
                exp: "\\( f'(x) = 3\\sin^2(2x)\\cos(2x)\\cdot 2 = 6\\sin^2(2x)\\cos(2x) \\). At \\( x=\\pi/8 \\), \\( 2x = \\pi/4 \\). \\( \\sin(\\pi/4) = \\cos(\\pi/4) = \\frac{\\sqrt{2}}{2} \\). \\( f'(\\pi/8) = 6(\\frac{\\sqrt{2}}{2})^2(\\frac{\\sqrt{2}}{2}) = 6(\\frac{1}{2})(\\frac{\\sqrt{2}}{2}) = \\frac{3\\sqrt{2}}{2} \\)."
            },
            {
                q: "Find the derivative of \\( y = \\sqrt{x + \\sqrt{x}} \\) at \\( x=1 \\).",
                options: ["\\( \\frac{1}{4\\sqrt{2}} \\)", "\\( \\frac{3}{2\\sqrt{2}} \\)", "\\( \\frac{3\\sqrt{2}}{8} \\)", "\\( \\frac{1}{2\\sqrt{2}} \\)"],
                answer: 2,
                exp: "\\( y' = \\frac{1}{2\\sqrt{x+\\sqrt{x}}} \\cdot (1 + \\frac{1}{2\\sqrt{x}}) \\). At \\( x=1 \\), \\( y' = \\frac{1}{2\\sqrt{2}}(1 + \\frac{1}{2}) = \\frac{3}{4\\sqrt{2}} \\), which rationalizes to \\( \\frac{3\\sqrt{2}}{8} \\)."
            },
            {
                q: "Find \\( y' \\) for \\( y = x^{\\cos x} \\).",
                options: [
                    "\\( x^{\\cos x - 1} \\cos x \\)",
                    "\\( -x^{\\cos x} \\sin x \\ln x \\)",
                    "\\( x^{\\cos x} \\left( \\frac{\\cos x}{x} + \\sin x \\ln x \\right) \\)",
                    "\\( x^{\\cos x} \\left( \\frac{\\cos x}{x} - \\sin x \\ln x \\right) \\)"
                ],
                answer: 3,
                exp: "Use logarithmic differentiation. \\( \\ln y = \\cos x \\ln x \\). Differentiate implicitly: \\( \\frac{y'}{y} = -\\sin x \\ln x + \\cos x \\cdot \\frac{1}{x} \\). Multiply by \\( y \\) to get \\( y' = x^{\\cos x} (\\frac{\\cos x}{x} - \\sin x \\ln x) \\)."
            },
            {
                q: "If \\( f(x) = \\ln(x^2 + 2x + 5) \\), find \\( f'(1) \\).",
                options: ["\\( \\frac{1}{4} \\)", "\\( \\frac{1}{2} \\)", "\\( \\frac{1}{8} \\)", "\\( 1 \\)"],
                answer: 1,
                exp: "Using the chain rule, \\( f'(x) = \\frac{1}{x^2+2x+5} \\cdot (2x+2) \\). Substituting \\( x=1 \\), we get \\( \\frac{4}{1+2+5} = \\frac{4}{8} = \\frac{1}{2} \\)."
            },
            {
                q: "Find \\( \\frac{dy}{dx} \\) if \\( e^{xy} = 2x + y \\).",
                options: [
                    "\\( \\frac{2 - y e^{xy}}{x e^{xy} - 1} \\)",
                    "\\( \\frac{2}{x e^{xy} - 1} \\)",
                    "\\( \\frac{2 - e^{xy}}{e^{xy} - 1} \\)",
                    "\\( \\frac{y e^{xy} - 2}{x e^{xy}} \\)"
                ],
                answer: 0,
                exp: "Implicit differentiation: \\( e^{xy}(y + x y') = 2 + y' \\). Distribute: \\( y e^{xy} + x e^{xy} y' = 2 + y' \\). Isolate \\( y' \\): \\( x e^{xy}y' - y' = 2 - y e^{xy} \\implies y'(x e^{xy} - 1) = 2 - y e^{xy} \\implies y' = \\frac{2 - y e^{xy}}{x e^{xy} - 1} \\)."
            },
            {
                q: "Let \\( f(x) = \\arccos(2x) \\). What is the domain of \\( f'(x) \\)?",
                options: ["\\( [-\\frac{1}{2}, \\frac{1}{2}] \\)", "\\( (-1, 1) \\)", "\\( (-\\frac{1}{2}, \\frac{1}{2}) \\)", "\\( (-\\infty, \\infty) \\)"],
                answer: 2,
                exp: "The derivative is \\( f'(x) = \\frac{-2}{\\sqrt{1-(2x)^2}} = \\frac{-2}{\\sqrt{1-4x^2}} \\). The expression inside the square root must be strictly positive: \\( 1 - 4x^2 > 0 \\implies 4x^2 < 1 \\implies x^2 < 1/4 \\implies -1/2 < x < 1/2 \\)."
            },
            {
                q: "Let \\( f(x) = e^{3x} + 2x \\). If \\( g(x) = f^{-1}(x) \\), find \\( g'(1) \\).",
                options: ["\\( \\frac{1}{5} \\)", "\\( 5 \\)", "\\( \\frac{1}{3} \\)", "\\( \\frac{1}{2} \\)"],
                answer: 0,
                exp: "Find \\( x \\) such that \\( f(x)=1 \\). Observation shows \\( f(0) = e^0 + 0 = 1 \\). Using the inverse function derivative rule: \\( g'(1) = \\frac{1}{f'(0)} \\). Since \\( f'(x) = 3e^{3x} + 2 \\), \\( f'(0) = 5 \\). Thus \\( g'(1) = 1/5 \\)."
            },
            {
                q: "Find \\( \\frac{d^2y}{dx^2} \\) for \\( y = \\cos(2x) \\).",
                options: ["\\( 4\\cos(2x) \\)", "\\( -4\\cos(2x) \\)", "\\( -2\\cos(2x) \\)", "\\( 4\\sin(2x) \\)"],
                answer: 1,
                exp: "Using the chain rule: \\( y' = -2\\sin(2x) \\). Differentiating again, \\( y'' = -2\\cos(2x) \\cdot 2 = -4\\cos(2x) \\)."
            },
            {
                q: "If \\( x^3 - xy + y^2 = 7 \\), find \\( \\frac{dy}{dx} \\) at the point \\( (1, 3) \\).",
                options: ["\\( 1 \\)", "\\( -1 \\)", "\\( 0 \\)", "\\( 5 \\)"],
                answer: 2,
                exp: "Differentiating implicitly: \\( 3x^2 - (1\\cdot y + x\\cdot y') + 2yy' = 0 \\). At (1,3): \\( 3(1)^2 - (3 + 1\\cdot y') + 2(3)y' = 0 \\implies 3 - 3 - y' + 6y' = 0 \\implies 5y' = 0 \\implies y'=0 \\)."
            },
            {
                q: "What is the derivative of \\( f(x) = 3^{x^2} \\)?",
                options: [
                    "\\( 2x \\ln(3) 3^{x^2} \\)",
                    "\\( x^2 3^{x^2-1} \\)",
                    "\\( 2x \\cdot 3^{x^2} \\)",
                    "\\( \\ln(3) 3^{x^2} \\)"
                ],
                answer: 0,
                exp: "The derivative of \\( a^u \\) is \\( a^u \\ln(a) \\cdot u' \\). Here \\( u=x^2 \\), so \\( u'=2x \\). Thus, \\( f'(x) = 3^{x^2} \\ln(3) \\cdot 2x \\)."
            },
            {
                q: "Find the derivative of \\( y = \\text{arcsec}(x) \\) at \\( x = 2 \\).",
                options: ["\\( \\frac{1}{\\sqrt{3}} \\)", "\\( \\frac{\\sqrt{3}}{6} \\)", "\\( \\frac{1}{2} \\)", "\\( \\frac{2}{\\sqrt{3}} \\)"],
                answer: 1,
                exp: "The formula is \\( y' = \\frac{1}{|x|\\sqrt{x^2-1}} \\). For \\( x=2 \\), \\( y' = \\frac{1}{2\\sqrt{4-1}} = \\frac{1}{2\\sqrt{3}} \\). Rationalizing the denominator yields \\( \\frac{\\sqrt{3}}{6} \\)."
            },
            {
                q: "Use logarithmic differentiation to find \\( y' \\) for \\( y = \\frac{e^x \\sqrt{x+1}}{x^2} \\).",
                options: [
                    "\\( y \\left( 1 + \\frac{1}{2(x+1)} - \\frac{2}{x} \\right) \\)",
                    "\\( y \\left( 1 + \\frac{1}{x+1} - \\frac{2}{x} \\right) \\)",
                    "\\( 1 + \\frac{1}{2(x+1)} - \\frac{2}{x} \\)",
                    "\\( y \\left( x + \\frac{1}{2(x+1)} - \\frac{2}{x} \\right) \\)"
                ],
                answer: 0,
                exp: "Take the natural log of both sides: \\( \\ln y = x + \\frac{1}{2}\\ln(x+1) - 2\\ln x \\). Differentiating gives \\( \\frac{y'}{y} = 1 + \\frac{1}{2(x+1)} - \\frac{2}{x} \\). Multiply by \\( y \\) to isolate \\( y' \\)."
            }
        ];

        const labels = ['A', 'B', 'C', 'D'];
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOptionIndex = null;

        function renderQuestion() {
            const q = questions[currentQuestionIndex];
            document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
            
            let html = `<div class="question-container active">
                            <div class="question">${q.q}</div>
                            <ul class="options">`;
            
            q.options.forEach((opt, idx) => {
                html += `<li class="option" data-index="${idx}">
                            <span class="option-label">${labels[idx]}</span>
                            <span class="option-text">${opt}</span>
                         </li>`;
            });
            
            html += `</ul></div>`;
            document.getElementById('question-wrapper').innerHTML = html;
            
            // reset UI state
            document.getElementById('submit-btn').style.display = 'inline-block';
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('feedback').innerText = '';
            document.getElementById('feedback').className = '';
            selectedOptionIndex = null;

            // Trigger MathJax
            if(window.MathJax) {
                MathJax.typesetPromise();
            }

            const optionElements = document.querySelectorAll('.option');
            optionElements.forEach(opt => {
                opt.addEventListener('click', function() {
                    if (this.classList.contains('disabled')) return;
                    
                    optionElements.forEach(o => o.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedOptionIndex = parseInt(this.getAttribute('data-index'));
                    document.getElementById('submit-btn').disabled = false;
                });
            });
        }

        document.getElementById('submit-btn').addEventListener('click', () => {
            if (selectedOptionIndex === null) return;
            
            const q = questions[currentQuestionIndex];
            const optionElements = document.querySelectorAll('.option');
            const feedbackEl = document.getElementById('feedback');

            optionElements.forEach(opt => opt.classList.add('disabled'));
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'inline-block';

            let explanationHTML = `<br><span style="font-weight:normal; font-size: 0.9em; color: #555;">${q.exp}</span>`;

            if (selectedOptionIndex === q.answer) {
                score++;
                optionElements[selectedOptionIndex].classList.add('correct');
                feedbackEl.innerHTML = `Correct! ${explanationHTML}`;
                feedbackEl.className = 'text-correct';
            } else {
                optionElements[selectedOptionIndex].classList.add('incorrect');
                optionElements[q.answer].classList.add('correct');
                feedbackEl.innerHTML = `Incorrect. ${explanationHTML}`;
                feedbackEl.className = 'text-incorrect';
            }

            if(window.MathJax) {
                MathJax.typesetPromise([feedbackEl]);
            }
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                renderQuestion();
            } else {
                document.getElementById('quiz').style.display = 'none';
                document.getElementById('intro-text').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('score-val').innerText = score;
            }
        });

        window.onload = renderQuestion;
    </script>
</body>
</html>
