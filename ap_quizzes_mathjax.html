    padding: 20px;
  }

    border-bottom: 2px solid #0056b3;
    padding-bottom: 10px;
  }
  .menu-course {
    background: #ffffff;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    margin-bottom: 15px;
    overflow: hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  .course-btn {
    width: 100%;
    padding: 15px 20px;
    background: #007bff;
    color: #fff;
    border: none;
    text-align: left;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }
  .course-btn:hover { background: #0056b3; }
  .units-container {
    display: none;
    padding: 10px 20px;
    background: #fdfdfd;
  }
  .unit-btn {
    width: 100%;
    padding: 10px 15px;
    margin: 5px 0;
    background: #6c757d;
    color: #fff;
    border: none;
    text-align: left;
    font-size: 1em;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .unit-btn:hover { background: #5a6268; }
  
  /* Quiz View */
  .hidden { display: none !important; }
  #score-board {
    position: sticky;
    top: 0;
    background: #343a40;
    color: #fff;
    padding: 15px 20px;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    z-index: 1000;
    margin-bottom: 25px;
  }
  .back-btn {
    background: #dc3545;
    color: #fff;
    border: none;
    padding: 8px 15px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  .back-btn:hover { background: #c82333; }
  
  .question-card {
    background: #fff;
    padding: 30px;
    border-radius: 8px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    border: 1px solid #e9ecef;
  }
  .question-header {
    display: flex;
    justify-content: space-between;
    color: #6c757d;
    font-size: 0.9em;
    font-weight: bold;
    margin-bottom: 15px;
    text-transform: uppercase;
  }
  .question-title {
    font-weight: bold;
    margin-top: 0;
    margin-bottom: 25px;
    font-size: 1.2em;
    line-height: 1.4;
  }
  .option-btn {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: 2px solid #ced4da;
    border-radius: 6px;
    background: #fff;
    text-align: left;
    font-size: 1.1em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .option-btn:hover:not(:disabled) {
    background: #e2e6ea;
    border-color: #adb5bd;
  }
  .option-btn:disabled {
    cursor: not-allowed;
    color: #495057;
  }
  .correct-ans {
    background: #d4edda !important;
    border-color: #28a745 !important;
    color: #155724 !important;
  }
  .incorrect-ans {
    background: #f8d7da !important;
    border-color: #dc3545 !important;
    color: #721c24 !important;
  }
  
  .feedback-container {
    margin-top: 20px;
    padding: 15px;
    border-radius: 6px;
    font-size: 1.1em;
    font-weight: bold;
    display: none;
    text-align: center;
  }
  .feedback-container.success { display: block; background: #d4edda; color: #155724; border: 1px solid #c3e6cb;}
  .feedback-container.error { display: block; background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb;}
  
  .next-btn {
    display: none;
    width: 100%;
    padding: 15px;
    margin-top: 20px;
    background: #28a745;
    color: white;
    font-size: 1.2em;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }
  .next-btn:hover { background: #218838; }

  #results-view {
    text-align: center;
    background: #fff;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  }
  .final-score {
    font-size: 3em;
    color: #007bff;
    margin: 20px 0;
  }
</style>

  let currentScore = 0;
  let currentCourse = '';
  let currentUnit = '';
  let currentQuestionIndex = 0;
  let currentQuestionsList = [];

  function initMenu() {
    const menuView = document.getElementById('menu-view');
    menuView.innerHTML = '';
    
    for (const course in quizData) {
      const courseDiv = document.createElement('div');
      courseDiv.className = 'menu-course';
      
      const courseBtn = document.createElement('button');
      courseBtn.className = 'course-btn';
      courseBtn.innerText = course;
      courseBtn.onclick = () => toggleUnits(courseDiv);
      
      const unitsContainer = document.createElement('div');
      unitsContainer.className = 'units-container';
      
      for (const unit in quizData[course]) {
        const unitBtn = document.createElement('button');
        unitBtn.className = 'unit-btn';
        unitBtn.innerText = unit + " (20 Questions)";
        unitBtn.onclick = () => startQuiz(course, unit);
        unitsContainer.appendChild(unitBtn);
      }
      
      courseDiv.appendChild(courseBtn);
      courseDiv.appendChild(unitsContainer);
      menuView.appendChild(courseDiv);
    }
  }

  function toggleUnits(courseDiv) {
    const container = courseDiv.querySelector('.units-container');
    container.style.display = container.style.display === 'block' ? 'none' : 'block';
  }

  function showMenu() {
    document.getElementById('menu-view').classList.remove('hidden');
    document.getElementById('quiz-view').classList.add('hidden');
    document.getElementById('results-view').classList.add('hidden');
    window.scrollTo(0,0);
  }

  function startQuiz(course, unit) {
    currentCourse = course;
    currentUnit = unit;
    currentScore = 0;
    currentQuestionIndex = 0;
    currentQuestionsList = quizData[course][unit];
    
    document.getElementById('menu-view').classList.add('hidden');
    document.getElementById('results-view').classList.add('hidden');
    document.getElementById('quiz-view').classList.remove('hidden');
    
    document.getElementById('quiz-title').innerText = course + " - " + unit;
    updateScoreBoard();
    
    renderCurrentQuestion();
    window.scrollTo(0,0);
  }

  function updateScoreBoard() {
    document.getElementById('score-text').innerText = `Score: ${currentScore} / 20`;
  }

  function renderCurrentQuestion() {
    const container = document.getElementById('question-container');
    container.innerHTML = ''; // Clear previous
    
    const q = currentQuestionsList[currentQuestionIndex];
    
    const qCard = document.createElement('div');
    qCard.className = 'question-card';
    
    const qHeader = document.createElement('div');
    qHeader.className = 'question-header';
    qHeader.innerHTML = `<span>Question ${currentQuestionIndex + 1} of 20</span>`;
    qCard.appendChild(qHeader);
    
    const qTitle = document.createElement('h3');
    qTitle.className = 'question-title';
    qTitle.innerHTML = q.q;
    qCard.appendChild(qTitle);
    
    const optionsContainer = document.createElement('div');
    const labels = ['A', 'B', 'C', 'D'];
    
    q.options.forEach((optText, optIndex) => {
      const optBtn = document.createElement('button');
      optBtn.className = 'option-btn';
      optBtn.id = `opt-${optIndex}`;
      optBtn.innerHTML = `<strong>${labels[optIndex]}.</strong> <span class="math-opt">${optText}</span>`;
      optBtn.onclick = () => handleAnswer(optIndex, q.answer, qCard);
      optionsContainer.appendChild(optBtn);
    });
    
    qCard.appendChild(optionsContainer);
    
    const feedbackDiv = document.createElement('div');
    feedbackDiv.className = 'feedback-container';
    feedbackDiv.id = 'current-feedback';
    qCard.appendChild(feedbackDiv);
    
    const nextBtn = document.createElement('button');
    nextBtn.className = 'next-btn';
    nextBtn.id = 'next-btn';
    nextBtn.innerText = currentQuestionIndex === 19 ? 'Finish Quiz' : 'Next Question →';
    nextBtn.onclick = handleNext;
    qCard.appendChild(nextBtn);
    
    container.appendChild(qCard);
    
    // Trigger MathJax typesetting for the dynamically injected content
    if (window.MathJax) {
        MathJax.typesetPromise([container]).catch((err) => console.log(err.message));
    }
  }

  function handleAnswer(selectedIndex, correctIndex, qCard) {
    // Disable buttons
    const buttons = qCard.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);
    
    const feedbackDiv = document.getElementById('current-feedback');
    const nextBtn = document.getElementById('next-btn');
    
    if (selectedIndex === correctIndex) {
      document.getElementById(`opt-${selectedIndex}`).classList.add('correct-ans');
      feedbackDiv.innerText = "Correct!";
      feedbackDiv.className = "feedback-container success";
      currentScore++;
    } else {
      document.getElementById(`opt-${selectedIndex}`).classList.add('incorrect-ans');
      document.getElementById(`opt-${correctIndex}`).classList.add('correct-ans');
      feedbackDiv.innerText = "Incorrect. The correct answer was " + ['A','B','C','D'][correctIndex] + ".";
      feedbackDiv.className = "feedback-container error";
    }
    
    updateScoreBoard();
    nextBtn.style.display = 'block'; // Show next button
  }

  function handleNext() {
    currentQuestionIndex++;
    if (currentQuestionIndex < 20) {
      renderCurrentQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    document.getElementById('quiz-view').classList.add('hidden');
    document.getElementById('results-view').classList.remove('hidden');
    document.getElementById('final-score-text').innerText = `${currentScore} / 20`;
  }

  // Initialize
  initMenu();
</script>
