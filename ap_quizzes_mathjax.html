 and aggressively insulting language directed at a target.", "A subtle, deeply ironic critique of overarching societal norms and values."], "answer": 2, "explanation": "An invective is a discourse that casts blame on somebody or something, using aggressive, abusive, or highly critical language."}, {"q": "Which of the following defines a 'periodic sentence' in rhetorical syntax?", "options": ["It relies heavily on the omission of conjunctions between coordinate phrases.", "It establishes the main thought at the beginning and follows with trailing modifiers.", "The main independent clause or predicate is withheld until the very end of the sentence.", "It consists of two or more independent clauses joined by a coordinating conjunction."], "answer": 2, "explanation": "A periodic sentence saves the main independent clause or predicate for the very end, building suspense or emphasis."}, {"q": "Which fallacy occurs when an arguer asserts that an action will inevitably lead to a disastrous chain of events, without providing sufficient causal evidence for those leaps?", "options": ["Slippery Slope", "False Dilemma", "Non Sequitur", "Red Herring"], "answer": 0, "explanation": "The slippery slope fallacy erroneously argues that one minor event will trigger a catastrophic chain reaction without sufficient causal evidence."}, {"q": "Which traditional rhetorical mode's primary purpose is to explain, define, or inform the audience through detailed analysis, classification, and illustration?", "options": ["Description", "Persuasion", "Exposition", "Narration"], "answer": 2, "explanation": "Expository writing aims to clarify, explain, or inform the reader about a specific subject through organized analysis."}, {"q": "The repetition of the last word of one clause at the very beginning of the following clause (e.g., 'Fear leads to anger. Anger leads to hate.') is formally called:", "options": ["Antimetabole", "Anadiplosis", "Epanalepsis", "Chiasmus"], "answer": 1, "explanation": "Anadiplosis repeats the final word of a preceding clause at the very beginning of the next clause, creating a tight chain of reasoning or emphasis."}, {"q": "Which syntactic device involves the deliberate omission of conjunctions between a series of related clauses to accelerate the rhythm of the prose?", "options": ["Anaphora", "Epistrophe", "Polysyndeton", "Asyndeton"], "answer": 3, "explanation": "Asyndeton is the omission of conjunctions (like 'and', 'or', 'but') in a series, which speeds up the rhythm and creates a sense of rapid succession."}, {"q": "Which of the following best defines a 'pedantic' tone in a piece of prose?", "options": ["Overly concerned with minute details, formal rules, or displaying academic learning.", "Expressing profound, inconsolable sorrow, mourning, or regret over a loss.", "Intended heavily to teach or moralize instructively to the audience.", "Characterized by a bitter, mocking, or deeply cynical attitude toward the subject."], "answer": 0, "explanation": "A pedantic tone is overly scholarly, academic, and obsessively concerned with minor details, often showing off the writer's learning."}, {"q": "In classical deductive logic, what exactly constitutes a syllogism?", "options": ["A foundational premise based entirely on qualitative empirical observation.", "A formal three-part argument consisting of a major premise, a minor premise, and a conclusion.", "A type of circular reasoning where the premise assumes the conclusion.", "A critical error in logical construction resulting in a non-sequitur."], "answer": 1, "explanation": "A syllogism is the core of classical deductive logic, structured with a major premise, a minor premise, and a logically deduced conclusion."}, {"q": "Which logical fallacy is characterized by the deliberate misrepresentation of an opponent's argument to make it easier to attack?", "options": ["Ad Hominem", "Post hoc ergo propter hoc", "Begging the question", "Straw Man"], "answer": 3, "explanation": "A Straw Man fallacy involves setting up a weak or exaggerated version of the opponent's position so it is easily knocked down or refuted."}, {"q": "When a speaker utilizes 'chiasmus', what syntactical structure are they creating?", "options": ["A grammatically unbalanced sentence that creates a sense of unease.", "The repetition of vowel sounds within closely grouped words.", "A jarring juxtaposition of highly contradictory vocabulary words.", "An inverted relationship between the syntactical elements of parallel phrases."], "answer": 3, "explanation": "Chiasmus is a reversal of grammatical structures in successive phrases or clauses ('AB-BA'), such as 'Ask not what your country can do for you...'"}]}, "AP Chinese": {"Unit 1": [{"q": "What is the traditional Chinese greeting asked around meal times?", "options": ["\u5f88\u9ad8\u5174\u8ba4\u8bc6\u4f60 (h\u011bn g\u0101o x\u00ecng r\u00e8n sh\u00ed n\u01d0)", "\u53bb\u54ea\u513f\uff1f (q\u00f9 n\u01cer?)", "\u4f60\u5403\u4e86\u5417\uff1f (n\u01d0 ch\u012b le ma?)", "\u4f60\u597d\u5417\uff1f (n\u01d0 h\u01ceo ma?)"], "answer": 2, "explanation": "Historically, food scarcity made 'Have you eaten?' (\u4f60\u5403\u4e86\u5417\uff1f) a warm, practical way to show care, equivalent to asking 'How are you?'."}, {"q": "What is the pinyin for the Chinese word 'hello'?", "options": ["n\u01d0 h\u01ceo", "w\u01d2 ai n\u01d0", "xi\u00e8 xie", "z\u00e0i ji\u00e0n"], "answer": 0, "explanation": "In Mandarin, 'n\u01d0' means 'you' and 'h\u01ceo' means 'good'. Together, they form the standard greeting 'hello'."}, {"q": "Which animal is NOT in the Chinese Zodiac?", "options": ["Dragon", "Pig", "Dog", "Cat"], "answer": 3, "explanation": "According to the traditional legend of the Great Race, the Rat pushed the Cat into the water, so the Cat did not make it into the 12-animal Zodiac."}, {"q": "What does '\u559c\u6b22' (x\u01d0 huan) mean?", "options": ["To like", "To sleep", "To eat", "To walk"], "answer": 0, "explanation": "\u559c\u6b22 (x\u01d0 huan) t   let currentScore = 0;
  let currentCourse = '';
  let currentUnit = '';
  let currentQuestionIndex = 0;
  let currentQuestionsList = [];

  function initMenu() {
    const menuView = document.getElementById('menu-view');
    menuView.innerHTML = '';
    
    for (const course in quizData) {
      const courseDiv = document.createElement('div');
      courseDiv.className = 'menu-course';
      
      const courseBtn = document.createElement('button');
      courseBtn.className = 'course-btn';
      courseBtn.innerText = course;
      courseBtn.onclick = () => toggleUnits(courseDiv);
      
      const unitsContainer = document.createElement('div');
      unitsContainer.className = 'units-container';
      
      for (const unit in quizData[course]) {
        const unitBtn = document.createElement('button');
        unitBtn.className = 'unit-btn';
        unitBtn.innerText = unit + " (20 Questions)";
        unitBtn.onclick = () => startQuiz(course, unit);
        unitsContainer.appendChild(unitBtn);
      }
      
      courseDiv.appendChild(courseBtn);
      courseDiv.appendChild(unitsContainer);
      menuView.appendChild(courseDiv);
    }
  }

  function toggleUnits(courseDiv) {
    const container = courseDiv.querySelector('.units-container');
    container.style.display = container.style.display === 'block' ? 'none' : 'block';
  }

  function showMenu() {
    document.getElementById('menu-view').classList.remove('hidden');
    document.getElementById('quiz-view').classList.add('hidden');
    document.getElementById('results-view').classList.add('hidden');
    window.scrollTo(0,0);
  }

  function startQuiz(course, unit) {
    currentCourse = course;
    currentUnit = unit;
    currentScore = 0;
    currentQuestionIndex = 0;
    currentQuestionsList = quizData[course][unit];
    
    document.getElementById('menu-view').classList.add('hidden');
    document.getElementById('results-view').classList.add('hidden');
    document.getElementById('quiz-view').classList.remove('hidden');
    
    document.getElementById('quiz-title').innerText = course + " - " + unit;
    updateScoreBoard();
    
    renderCurrentQuestion();
    window.scrollTo(0,0);
  }

  function updateScoreBoard() {
    document.getElementById('score-text').innerText = `Score: ${currentScore} / 20`;
  }

  function renderCurrentQuestion() {
    const container = document.getElementById('question-container');
    container.innerHTML = ''; 
    
    const q = currentQuestionsList[currentQuestionIndex];
    
    const qCard = document.createElement('div');
    qCard.className = 'question-card';
    
    const qHeader = document.createElement('div');
    qHeader.className = 'question-header';
    qHeader.innerHTML = `<span>Question ${currentQuestionIndex + 1} of 20</span>`;
    qCard.appendChild(qHeader);
    
    const qTitle = document.createElement('h3');
    qTitle.className = 'question-title';
    qTitle.innerHTML = q.q;
    qCard.appendChild(qTitle);
    
    const optionsContainer = document.createElement('div');
    const labels = ['A', 'B', 'C', 'D'];
    
    q.options.forEach((optText, optIndex) => {
      const optBtn = document.createElement('button');
      optBtn.className = 'option-btn';
      optBtn.id = `opt-${optIndex}`;
      optBtn.innerHTML = `<strong>${labels[optIndex]}.</strong> <span class="math-opt">${optText}</span>`;
      optBtn.onclick = () => handleAnswer(optIndex, q.answer, qCard);
      optionsContainer.appendChild(optBtn);
    });
    
    qCard.appendChild(optionsContainer);
    
    const feedbackDiv = document.createElement('div');
    feedbackDiv.className = 'feedback-container';
    feedbackDiv.id = 'current-feedback';
    qCard.appendChild(feedbackDiv);

    const expDiv = document.createElement('div');
    expDiv.className = 'explanation-container';
    expDiv.id = 'current-explanation';
    expDiv.innerHTML = `<span class="explanation-title">Explanation:</span>${q.explanation}`;
    qCard.appendChild(expDiv);
    
    const nextBtn = document.createElement('button');
    nextBtn.className = 'next-btn';
    nextBtn.id = 'next-btn';
    nextBtn.innerText = currentQuestionIndex === 19 ? 'Finish Quiz' : 'Next Question →';
    nextBtn.onclick = handleNext;
    qCard.appendChild(nextBtn);
    
    container.appendChild(qCard);
    
    if (window.MathJax) {
        MathJax.typesetPromise([container]).catch((err) => console.log(err.message));
    }
  }

  function handleAnswer(selectedIndex, correctIndex, qCard) {
    const buttons = qCard.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);
    
    const feedbackDiv = document.getElementById('current-feedback');
    const explanationDiv = document.getElementById('current-explanation');
    const nextBtn = document.getElementById('next-btn');
    
    if (selectedIndex === correctIndex) {
      document.getElementById(`opt-${selectedIndex}`).classList.add('correct-ans');
      feedbackDiv.innerText = "Correct!";
      feedbackDiv.className = "feedback-container success";
      currentScore++;
    } else {
      document.getElementById(`opt-${selectedIndex}`).classList.add('incorrect-ans');
      document.getElementById(`opt-${correctIndex}`).classList.add('correct-ans');
      feedbackDiv.innerText = "Incorrect. The correct answer was " + ['A','B','C','D'][correctIndex] + ".";
      feedbackDiv.className = "feedback-container error";
    }
    
    explanationDiv.style.display = 'block';
    nextBtn.style.display = 'block'; 
    updateScoreBoard();
  }

  function handleNext() {
    currentQuestionIndex++;
    if (currentQuestionIndex < 20) {
      renderCurrentQuestion();
    } else {
      showResults();
    }
  }

  function showResults() {
    document.getElementById('quiz-view').classList.add('hidden');
    document.getElementById('results-view').classList.remove('hidden');
    document.getElementById('final-score-text').innerText = `${currentScore} / 20`;
  }

  initMenu();
</script>
